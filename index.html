<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰凌呀 · 小栈</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS Animation -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <style>
        :root {
            --sakura-pink: #FADADD;
            --sakura-mid: #F4B8C1;
            --sakura-deep: #E88D9B;
            --lavender: #E8D5F5;
            --lavender-deep: #C9A9E0;
            --sky-blue: #D4EAF7;
            --sky-deep: #A3C9E0;
            --mint-green: #D4F0E0;
            --mint-deep: #A3D9B8;
            --peach: #FDE4D0;
            --peach-deep: #F5C9A0;
            --white-soft: #FFFAFB;
            --white-card: rgba(255, 255, 255, 0.75);
            --white-card-hover: rgba(255, 255, 255, 0.92);
            --text-primary: #4A3F4A;
            --text-secondary: #7A6F7A;
            --text-light: #A89DA8;
            --shadow-soft: 0 4px 20px rgba(200, 160, 180, 0.18);
            --shadow-card: 0 8px 32px rgba(180, 140, 160, 0.14);
            --shadow-hover: 0 14px 40px rgba(180, 140, 160, 0.22);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: clamp(1rem, 2vw, 1.1rem);
        }

        body {
            font-family: 'Quicksand', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(170deg, #FDE8EC 0%, #FDF2F8 15%, #F8F0F8 30%, #F0F0FA 50%, #F0F6FA 70%, #F5F0F8 85%, #FDE8EC 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .bg-decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(248, 200, 210, 0.25) 0%, transparent 70%);
            top: -100px;
            right: -80px;
            border-radius: 50%;
            animation: floatSlow 12s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(200, 180, 220, 0.2) 0%, transparent 70%);
            bottom: -60px;
            left: -90px;
            border-radius: 50%;
            animation: floatSlow 15s ease-in-out infinite reverse;
        }

        .bg-circle-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(180, 210, 230, 0.22) 0%, transparent 70%);
            top: 50%;
            left: 60%;
            border-radius: 50%;
            animation: floatSlow 10s ease-in-out infinite;
        }

        @keyframes floatSlow {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(18px, -20px) scale(1.04);
            }

            66% {
                transform: translate(-14px, 14px) scale(0.97);
            }
        }

        .sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .sakura-petal {
            position: absolute;
            top: -60px;
            opacity: 0.55;
            animation: sakuraFall linear infinite;
            font-size: 1.4rem;
        }

        @keyframes sakuraFall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.6;
            }

            25% {
                transform: translateY(25vh) translateX(40px) rotate(90deg);
                opacity: 0.5;
            }

            50% {
                transform: translateY(50vh) translateX(-30px) rotate(180deg);
                opacity: 0.35;
            }

            75% {
                transform: translateY(75vh) translateX(25px) rotate(270deg);
                opacity: 0.2;
            }

            100% {
                transform: translateY(105vh) translateX(-15px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* 导航栏 */
        .navbar {
            position: sticky;
            top: 16px;
            z-index: 1000;
            margin: 16px auto 0;
            max-width: 1100px;
            padding: 0 24px;
        }

        .navbar-inner {
            background: var(--white-card);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            border: 1px solid rgba(255, 220, 230, 0.5);
            border-radius: var(--radius-xl);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
        }

        .navbar-inner:hover {
            box-shadow: var(--shadow-card);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
        }

        .nav-brand .brand-icon {
            font-size: 1.6rem;
            animation: bounceGentle 2s ease-in-out infinite;
        }

        @keyframes bounceGentle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            position: relative;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--sakura-deep);
            background: rgba(250, 218, 221, 0.4);
        }

        .nav-links a i {
            margin-right: 5px;
            font-size: 0.85rem;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .hamburger:hover {
            background: rgba(250, 218, 221, 0.3);
        }

        /* Hero 区域 */
        .hero {
            text-align: center;
            padding: 60px 0 40px;
            position: relative;
        }

        .hero-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white-card);
            box-shadow: var(--shadow-card);
            margin-bottom: 18px;
            transition: var(--transition);
            background: linear-gradient(135deg, #FADADD, #E8D5F5);
        }

        .hero-avatar:hover {
            transform: scale(1.06);
            box-shadow: var(--shadow-hover);
        }

        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(1.8rem, 3.5vw, 2.4rem);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .hero .subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .hero .typed-wrapper {
            min-height: 28px;
            font-size: 0.95rem;
            color: var(--sakura-deep);
            font-weight: 500;
            margin-bottom: 16px;
        }

        .hero-social {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .hero-social a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--text-secondary);
            background: var(--white-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid rgba(230, 200, 210, 0.4);
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
        }

        .hero-social a:hover {
            color: var(--sakura-deep);
            background: var(--white-card-hover);
            box-shadow: var(--shadow-card);
            transform: translateY(-2px);
        }

        /* Section 通用 */
        .section {
            padding: 30px 0 50px;
        }

        .section-title {
            text-align: center;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .section-desc {
            text-align: center;
            color: var(--text-light);
            font-size: 0.92rem;
            margin-bottom: 32px;
        }

        /* 卡片通用 */
        .card {
            background: var(--white-card);
            backdrop-filter: blur(14px) saturate(1.3);
            -webkit-backdrop-filter: blur(14px) saturate(1.3);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 26px 28px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            background: var(--white-card-hover);
        }

        /* 博客卡片网格 */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
        }

        .blog-card .blog-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .blog-card .blog-tag {
            display: inline-block;
            background: var(--lavender);
            color: #6B5B7B;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .blog-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .blog-card h3 a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        .blog-card h3 a:hover {
            color: var(--sakura-deep);
        }

        .blog-card .blog-meta {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 10px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .blog-card .blog-excerpt {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .blog-loading {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            font-size: 0.9rem;
            grid-column: 1 / -1;
        }

        .blog-more {
            text-align: center;
            margin-top: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 11px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            text-decoration: none;
        }

        .btn-outline {
            background: var(--white-card);
            color: var(--text-secondary);
            border: 1px solid rgba(220, 200, 210, 0.5);
            backdrop-filter: blur(8px);
        }

        .btn-outline:hover {
            background: var(--white-card-hover);
            color: var(--sakura-deep);
            border-color: var(--sakura-mid);
        }

        /* 工具卡片网格 */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .tool-card {
            text-align: center;
            cursor: pointer;
        }

        .tool-card .tool-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: block;
            transition: var(--transition);
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.15);
        }

        .tool-card h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .tool-card p {
            font-size: 0.82rem;
            color: var(--text-light);
        }

        /* 工具面板（隐藏） */
        .tool-panel {
            display: none;
            margin-top: 28px;
            animation: fadeSlideIn 0.4s ease;
        }

        .tool-panel.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tool-panel .card {
            max-width: 700px;
            margin: 0 auto;
        }

        .tool-panel textarea,
        .tool-panel input {
            width: 100%;
            padding: 14px;
            border: 2px solid #F0E0E8;
            border-radius: var(--radius-md);
            font-family: 'Quicksand', 'Noto Sans SC', monospace;
            font-size: 0.9rem;
            background: rgba(255, 250, 252, 0.8);
            transition: var(--transition);
            resize: vertical;
            color: var(--text-primary);
        }

        .tool-panel textarea:focus,
        .tool-panel input:focus {
            outline: none;
            border-color: var(--sakura-mid);
            box-shadow: 0 0 0 4px rgba(244, 184, 193, 0.15);
        }

        .tool-panel textarea {
            min-height: 180px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #F4B8C1, #E88D9B);
            color: #fff;
            box-shadow: 0 4px 14px rgba(232, 141, 155, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(232, 141, 155, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--white-card);
            color: var(--text-secondary);
            border: 1px solid rgba(220, 200, 210, 0.5);
        }

        .btn-secondary:hover {
            background: var(--white-card-hover);
            color: var(--sakura-deep);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tool-output {
            margin-top: 16px;
            padding: 16px;
            background: rgba(248, 240, 245, 0.6);
            border-radius: var(--radius-md);
            font-family: 'Quicksand', 'Noto Sans SC', monospace;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(230, 200, 210, 0.3);
        }

        .tool-panel label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .tool-panel .form-group {
            margin-bottom: 16px;
        }

        .footer {
            text-align: center;
            padding: 40px 0 30px;
            color: var(--text-light);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        .footer .footer-heart {
            color: var(--sakura-deep);
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.2);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.15);
            }

            60% {
                transform: scale(1);
            }
        }

        .footer a {
            color: var(--sakura-deep);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--white-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(230, 200, 210, 0.4);
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-secondary);
            transition: var(--transition);
            opacity: 0;
            visibility: hidden;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            color: var(--sakura-deep);
            box-shadow: var(--shadow-card);
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 12px;
                top: 8px;
                margin-top: 8px;
            }

            .navbar-inner {
                padding: 12px 18px;
                border-radius: var(--radius-lg);
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 12px;
                right: 12px;
                margin-top: 10px;
                flex-direction: column;
                background: var(--white-card-hover);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-radius: var(--radius-lg);
                padding: 16px;
                box-shadow: var(--shadow-card);
                border: 1px solid rgba(240, 215, 225, 0.5);
                gap: 4px;
            }

            .nav-links.open {
                display: flex;
            }

            .nav-links a {
                padding: 10px 16px;
                border-radius: var(--radius-sm);
                font-size: 0.95rem;
            }

            .hamburger {
                display: block;
            }

            .hero {
                padding: 40px 0 24px;
            }

            .blog-grid {
                grid-template-columns: 1fr;
            }

            .tool-grid {
                grid-template-columns: 1fr 1fr;
            }

            .section {
                padding: 20px 0 36px;
            }
        }

        @media (max-width: 480px) {
            .tool-grid {
                grid-template-columns: 1fr;
            }

            .hero-social a {
                padding: 8px 14px;
                font-size: 0.82rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    <div class="sakura-container" id="sakuraContainer"></div>

    <nav class="navbar" data-aos="fade-down" data-aos-duration="600">
        <div class="navbar-inner">
            <a href="#" class="nav-brand">
                <span class="brand-icon">❄️</span>
                <span>冰凌呀 · 小栈</span>
            </a>
            <button class="hamburger" id="hamburgerBtn" aria-label="菜单">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="#home" class="active"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="#blog"><i class="fas fa-feather-alt"></i> 博客</a></li>
                <li><a href="#tools"><i class="fas fa-wand-magic-sparkles"></i> 工具</a></li>
                <li><a href="https://github.com/Ice-rink" target="_blank" rel="noopener"><i class="fab fa-github"></i>
                        GitHub</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="hero container" id="home" data-aos="fade-up" data-aos-duration="700">
            <img class="hero-avatar" src="https://avatars.githubusercontent.com/Ice-rink" alt="冰凌呀的头像" loading="eager"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="hero-avatar"
                style="display:none; width:110px; height:110px; margin:0 auto 18px; align-items:center; justify-content:center; font-size:2.8rem;">
                ❄️
            </div>
            <h1>冰凌呀 · Ice_rink</h1>
            <p class="subtitle">写点代码，记录生活，分享温柔的科技日常 ✨</p>
            <div class="typed-wrapper">
                <span id="typedOutput"></span>
            </div>
            <div class="hero-social">
                <a href="https://github.com/Ice-rink" target="_blank" rel="noopener">
                    <i class="fab fa-github"></i> GitHub
                </a>
                <a href="mailto:ice_rink@example.com">
                    <i class="far fa-envelope"></i> Email
                </a>
                <a href="#blog">
                    <i class="fas fa-feather-alt"></i> 博客
                </a>
            </div>
        </section>

        <!-- 博客区域 -->
        <section class="section container" id="blog" data-aos="fade-up" data-aos-duration="700">
            <h2 class="section-title">📝 最新博文</h2>
            <p class="section-desc">用文字记录技术路上的小发现与小确幸</p>
            <div class="blog-grid" id="blogGrid">
                <div class="blog-loading" id="blogLoading">
                    <span style="font-size:1.5rem;">🌸</span>
                    <p style="margin-top:6px;">正在加载文章...</p>
                </div>
            </div>
            <div class="blog-more">
                <a href="blog/index.html" class="btn btn-outline">
                    <i class="fas fa-list"></i> 查看全部文章
                </a>
            </div>
        </section>

        <!-- 工具区域 -->
        <section class="section container" id="tools" data-aos="fade-up" data-aos-duration="700">
            <h2 class="section-title">🛠️ 实用小工具</h2>
            <p class="section-desc">一些轻量级在线工具，让日常开发更顺手</p>
            <div class="tool-grid" id="toolGrid"></div>
            <div class="tool-panel" id="toolPanel"></div>
        </section>
    </main>

    <footer class="footer" data-aos="fade-up" data-aos-duration="700">
        <p>Made with <span class="footer-heart">💗</span> by <a href="https://github.com/Ice-rink" target="_blank"
                rel="noopener">Ice_rink</a> · 冰凌呀</p>
        <p style="margin-top:4px;font-size:0.78rem;">© 2026 Ice_rink · 保持好奇，保持温柔</p>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="回到顶部" title="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

    <script>
        (function () {
            AOS.init({ duration: 700, once: true, offset: 60 });

            // ===== 樱花飘落 =====
            const sakuraContainer = document.getElementById('sakuraContainer');
            const petalEmojis = ['🌸', '💮', '🌷', '✿', '❀', '🩷', '🌺'];
            const petalCount = 22;

            function createPetal() {
                const petal = document.createElement('span');
                petal.className = 'sakura-petal';
                petal.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
                petal.style.left = Math.random() * 100 + '%';
                petal.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
                petal.style.animationDuration = (Math.random() * 10 + 10) + 's';
                petal.style.animationDelay = Math.random() * 8 + 's';
                sakuraContainer.appendChild(petal);
                petal.addEventListener('animationend', () => {
                    petal.remove();
                    createPetal();
                });
            }
            for (let i = 0; i < petalCount; i++) {
                setTimeout(createPetal, i * 400);
            }

            // ===== Typed.js =====
            const typed = new Typed('#typedOutput', {
                strings: [
                    '「代码是诗，温柔是答案。」',
                    '「在0和1的世界里，种一朵花。」',
                    '「Bug会修好，明天会更好 ^_^」',
                    '「保持好奇，保持温柔。」',
                ],
                typeSpeed: 70,
                backSpeed: 40,
                backDelay: 2500,
                startDelay: 600,
                loop: true,
                showCursor: true,
                cursorChar: '|',
            });

            // ===== 汉堡菜单 =====
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const navLinks = document.getElementById('navLinks');
            hamburgerBtn.addEventListener('click', () => {
                navLinks.classList.toggle('open');
                const icon = hamburgerBtn.querySelector('i');
                if (navLinks.classList.contains('open')) {
                    icon.className = 'fas fa-times';
                } else {
                    icon.className = 'fas fa-bars';
                }
            });
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('open');
                    hamburgerBtn.querySelector('i').className = 'fas fa-bars';
                    navLinks.querySelectorAll('a').forEach(a => a.classList.remove('active'));
                    link.classList.add('active');
                });
            });

            // ===== 回到顶部 =====
            const backToTop = document.getElementById('backToTop');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 500) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // ===== Front Matter 解析 =====
            function parseFrontMatter(mdText) {
                const result = { meta: {}, content: '' };
                const fmRegex = /^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/;
                const match = mdText.match(fmRegex);
                if (match) {
                    const fmBlock = match[1];
                    result.content = match[2].trim();
                    fmBlock.split('\n').forEach(line => {
                        const colonIdx = line.indexOf(':');
                        if (colonIdx === -1) return;
                        const key = line.substring(0, colonIdx).trim();
                        let value = line.substring(colonIdx + 1).trim();
                        value = value.replace(/^["']|["']$/g, '');
                        if (value.startsWith('[') && value.endsWith(']')) {
                            try { value = JSON.parse(value); } catch (e) { }
                        }
                        result.meta[key] = value;
                    });
                } else {
                    result.content = mdText.trim();
                }
                return result;
            }

            // ===== 提取摘要 =====
            function extractExcerpt(markdownContent, maxLen = 120) {
                let text = markdownContent
                    .replace(/^#{1,6}\s+/gm, '')
                    .replace(/\*\*([^*]+)\*\*/g, '$1')
                    .replace(/\*([^*]+)\*/g, '$1')
                    .replace(/`([^`]+)`/g, '$1')
                    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                    .replace(/!\[.*?\]\([^)]+\)/g, '')
                    .replace(/\n+/g, ' ')
                    .trim();
                if (text.length > maxLen) {
                    text = text.substring(0, maxLen).replace(/\s+\S*$/, '') + '...';
                }
                return text;
            }

            // ===== 异步加载最新4篇文章 =====
            async function loadLatestPosts() {
                const blogGrid = document.getElementById('blogGrid');
                const loadingEl = document.getElementById('blogLoading');

                const posts = [];

                // 尝试加载 001.md ~ 030.md
                for (let i = 1; i <= 30; i++) {
                    const filename = String(i).padStart(3, '0') + '.md';
                    try {
                        const response = await fetch(`blog/posts/${filename}`);
                        if (!response.ok) continue;
                        const mdText = await response.text();
                        const parsed = parseFrontMatter(mdText);
                        posts.push({
                            id: filename.replace('.md', ''),
                            ...parsed.meta,
                            excerpt: extractExcerpt(parsed.content),
                        });
                    } catch (e) {
                        continue;
                    }
                }

                // 按日期降序排序
                posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

                // 取最新4篇
                const latest = posts.slice(0, 4);

                // 移除加载提示
                loadingEl.remove();

                if (latest.length === 0) {
                    blogGrid.innerHTML = '<div class="blog-loading"><p>📭 还没有文章，快去写第一篇吧~</p></div>';
                    return;
                }

                blogGrid.innerHTML = latest.map((post, i) => {
                    const tags = Array.isArray(post.tags) ? post.tags :
                        (typeof post.tags === 'string' ? [post.tags] : []);
                    return `
                    <div class="card blog-card" data-aos="fade-up" data-aos-duration="600" data-aos-delay="${i * 80}">
                        <div class="blog-tags">
                            ${tags.map(t => `<span class="blog-tag">${t}</span>`).join('')}
                        </div>
                        <h3><a href="blog/post.html?id=${post.id}">${post.title || '无标题'}</a></h3>
                        <div class="blog-meta">
                            <span><i class="far fa-calendar-alt"></i> ${post.date || ''}</span>
                        </div>
                        <p class="blog-excerpt">${post.excerpt || '(暂无摘要)'}</p>
                    </div>
                    `;
                }).join('');

                AOS.refresh();
            }

            // 启动博客加载
            loadLatestPosts();

            // ===== 工具数据和面板（保持不变） =====
            const tools = [
                { id: 'json-formatter', icon: '🔧', name: 'JSON 格式化', desc: '美化 / 压缩 JSON 数据', color: '#FADADD' },
                { id: 'regex-tester', icon: '🔍', name: '正则测试器', desc: '在线正则表达式匹配', color: '#E8D5F5' },
                { id: 'color-converter', icon: '🎨', name: '颜色转换', desc: 'HEX ↔ RGB ↔ HSL', color: '#D4EAF7' },
                { id: 'timestamp', icon: '⏰', name: '时间戳转换', desc: 'Unix 时间戳 ↔ 日期', color: '#FDE4D0' },
                { id: 'base64', icon: '🔐', name: 'Base64 编解码', desc: '文本 ↔ Base64', color: '#D4F0E0' },
                { id: 'word-count', icon: '📊', name: '字数统计', desc: '中英文混合计数', color: '#FADADD' },
            ];

            function renderTools() {
                const grid = document.getElementById('toolGrid');
                grid.innerHTML = tools.map((tool, i) => `
                <div class="card tool-card" data-aos="fade-up" data-aos-duration="600" data-aos-delay="${i * 80}" data-tool="${tool.id}" style="border-left: 4px solid ${tool.color};">
                  <span class="tool-icon">${tool.icon}</span>
                  <h4>${tool.name}</h4>
                  <p>${tool.desc}</p>
                </div>
              `).join('');
                AOS.refresh();
            }
            renderTools();

            const toolPanel = document.getElementById('toolPanel');
            let currentTool = null;

            document.getElementById('toolGrid').addEventListener('click', (e) => {
                const card = e.target.closest('.tool-card');
                if (!card) return;
                const toolId = card.dataset.tool;
                if (currentTool === toolId && toolPanel.classList.contains('active')) {
                    toolPanel.classList.remove('active');
                    currentTool = null;
                    return;
                }
                currentTool = toolId;
                toolPanel.classList.add('active');
                toolPanel.innerHTML = getToolHTML(toolId);
                toolPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
                initToolEvents(toolId);
            });

            function getToolHTML(toolId) {
                const tool = tools.find(t => t.id === toolId);
                const title = tool ? tool.name : '工具';
                switch (toolId) {
                    case 'json-formatter':
                        return `
                  <div class="card" data-aos="fade-up" data-aos-duration="400">
                    <h4 style="margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                      <span>🔧</span> JSON 格式化
                      <button class="btn btn-secondary" style="margin-left:auto;padding:6px 14px;font-size:0.8rem;" onclick="document.getElementById('toolPanel').classList.remove('active');currentTool=null;">
                        ✕ 关闭
                      </button>
                    </h4>
                    <div class="form-group">
                      <label for="jsonInput">输入 JSON 数据：</label>
                      <textarea id="jsonInput" placeholder='{"name":"冰凌呀","emoji":"❄️"}'></textarea>
                    </div>
                    <div class="btn-group">
                      <button class="btn btn-primary" id="btnFormat">✨ 格式化</button>
                      <button class="btn btn-secondary" id="btnMinify">📦 压缩</button>
                      <button class="btn btn-secondary" id="btnValidate">✅ 验证</button>
                      <button class="btn btn-secondary" id="btnClear">🗑 清空</button>
                    </div>
                    <div class="tool-output" id="jsonOutput" style="display:none;"></div>
                  </div>`;
                    case 'regex-tester':
                        return `
                  <div class="card" data-aos="fade-up" data-aos-duration="400">
                    <h4 style="margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                      <span>🔍</span> 正则测试器
                      <button class="btn btn-secondary" style="margin-left:auto;padding:6px 14px;font-size:0.8rem;" onclick="document.getElementById('toolPanel').classList.remove('active');currentTool=null;">
                        ✕ 关闭
                      </button>
                    </h4>
                    <div class="form-group">
                      <label for="regexPattern">正则表达式（不带前后斜杠）：</label>
                      <input type="text" id="regexPattern" placeholder="例如：\\d{4}-\\d{2}-\\d{2}">
                    </div>
                    <div class="form-group">
                      <label for="regexFlags">标志（可选）：</label>
                      <input type="text" id="regexFlags" placeholder="例如：g、i、gi" style="max-width:120px;">
                    </div>
                    <div class="form-group">
                      <label for="regexText">测试文本：</label>
                      <textarea id="regexText" placeholder="输入要匹配的文本..."></textarea>
                    </div>
                    <div class="btn-group">
                      <button class="btn btn-primary" id="btnRegexMatch">🔍 匹配</button>
                      <button class="btn btn-secondary" id="btnRegexClear">🗑 清空</button>
                    </div>
                    <div class="tool-output" id="regexOutput" style="display:none;"></div>
                  </div>`;
                    case 'color-converter':
                        return `
                  <div class="card" data-aos="fade-up" data-aos-duration="400">
                    <h4 style="margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                      <span>🎨</span> 颜色转换
                      <button class="btn btn-secondary" style="margin-left:auto;padding:6px 14px;font-size:0.8rem;" onclick="document.getElementById('toolPanel').classList.remove('active');currentTool=null;">
                        ✕ 关闭
                      </button>
                    </h4>
                    <div class="form-group">
                      <label for="colorInput">输入颜色值：</label>
                      <input type="text" id="colorInput" placeholder="例如：#FADADD 或 rgb(250,218,221) 或 hsl(350,76%,92%)">
                    </div>
                    <div class="btn-group">
                      <button class="btn btn-primary" id="btnConvert">🎨 转换</button>
                      <button class="btn btn-secondary" id="btnColorClear">🗑 清空</button>
                    </div>
                    <div class="tool-output" id="colorOutput" style="display:none;"></div>
                  </div>`;
                    case 'timestamp':
                        return `
                  <div class="card" data-aos="fade-up" data-aos-duration="400">
                    <h4 style="margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                      <span>⏰</span> 时间戳转换
                      <button class="btn btn-secondary" style="margin-left:auto;padding:6px 14px;font-size:0.8rem;" onclick="document.getElementById('toolPanel').classList.remove('active');currentTool=null;">
                        ✕ 关闭
                      </button>
                    </h4>
                    <div class="form-group">
                      <label for="tsInput">输入 Unix 时间戳（秒）或日期字符串：</label>
                      <input type="text" id="tsInput" placeholder="例如：1747612800 或 2026-05-19">
                    </div>
                    <div class="btn-group">
                      <button class="btn btn-primary" id="btnTsConvert">⏰ 转换</button>
                      <button class="btn btn-secondary" id="btnTsNow">🕐 当前时间戳</button>
                      <button class="btn btn-secondary" id="btnTsClear">🗑 清空</button>
                    </div>
                    <div class="tool-output" id="tsOutput" style="display:none;"></div>
                  </div>`;
                    case 'base64':
                        return `
                  <div class="card" data-aos="fade-up" data-aos-duration="400">
                    <h4 style="margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                      <span>🔐</span> Base64 编解码
                      <button class="btn btn-secondary" style="margin-left:auto;padding:6px 14px;font-size:0.8rem;" onclick="document.getElementById('toolPanel').classList.remove('active');currentTool=null;">
                        ✕ 关闭
                      </button>
                    </h4>
                    <div class="form-group">
                      <label for="b64Input">输入文本：</label>
                      <textarea id="b64Input" placeholder="输入要编码/解码的文本..."></textarea>
                    </div>
                    <div class="btn-group">
                      <button class="btn btn-primary" id="btnB64Encode">🔒 编码 (Encode)</button>
                      <button class="btn btn-secondary" id="btnB64Decode">🔓 解码 (Decode)</button>
                      <button class="btn btn-secondary" id="btnB64Clear">🗑 清空</button>
                    </div>
                    <div class="tool-output" id="b64Output" style="display:none;"></div>
                  </div>`;
                    case 'word-count':
                        return `
                  <div class="card" data-aos="fade-up" data-aos-duration="400">
                    <h4 style="margin-bottom:14px;display:flex;align-items:center;gap:8px;">
                      <span>📊</span> 字数统计
                      <button class="btn btn-secondary" style="margin-left:auto;padding:6px 14px;font-size:0.8rem;" onclick="document.getElementById('toolPanel').classList.remove('active');currentTool=null;">
                        ✕ 关闭
                      </button>
                    </h4>
                    <div class="form-group">
                      <label for="wcInput">输入文本：</label>
                      <textarea id="wcInput" placeholder="输入要统计的文本..."></textarea>
                    </div>
                    <div class="btn-group">
                      <button class="btn btn-primary" id="btnWcCount">📊 统计</button>
                      <button class="btn btn-secondary" id="btnWcClear">🗑 清空</button>
                    </div>
                    <div class="tool-output" id="wcOutput" style="display:none;"></div>
                  </div>`;
                    default:
                        return '';
                }
            }

            function initToolEvents(toolId) {
                switch (toolId) {
                    case 'json-formatter': {
                        const input = document.getElementById('jsonInput');
                        const output = document.getElementById('jsonOutput');
                        document.getElementById('btnFormat').addEventListener('click', () => {
                            try {
                                const obj = JSON.parse(input.value);
                                output.textContent = JSON.stringify(obj, null, 2);
                                output.style.display = 'block';
                                output.style.color = 'var(--text-primary)';
                            } catch (e) {
                                output.textContent = '❌ JSON 格式错误：' + e.message;
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                            }
                        });
                        document.getElementById('btnMinify').addEventListener('click', () => {
                            try {
                                const obj = JSON.parse(input.value);
                                output.textContent = JSON.stringify(obj);
                                output.style.display = 'block';
                                output.style.color = 'var(--text-primary)';
                            } catch (e) {
                                output.textContent = '❌ JSON 格式错误：' + e.message;
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                            }
                        });
                        document.getElementById('btnValidate').addEventListener('click', () => {
                            try {
                                JSON.parse(input.value);
                                output.textContent = '✅ JSON 格式正确！';
                                output.style.display = 'block';
                                output.style.color = '#6B9E7A';
                            } catch (e) {
                                output.textContent = '❌ JSON 格式错误：' + e.message;
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                            }
                        });
                        document.getElementById('btnClear').addEventListener('click', () => {
                            input.value = '';
                            output.style.display = 'none';
                        });
                        break;
                    }
                    case 'regex-tester': {
                        const patternInput = document.getElementById('regexPattern');
                        const flagsInput = document.getElementById('regexFlags');
                        const textInput = document.getElementById('regexText');
                        const output = document.getElementById('regexOutput');
                        document.getElementById('btnRegexMatch').addEventListener('click', () => {
                            try {
                                const pattern = patternInput.value;
                                const flags = flagsInput.value || '';
                                const text = textInput.value;
                                if (!pattern) {
                                    output.textContent = '⚠️ 请输入正则表达式';
                                    output.style.display = 'block';
                                    output.style.color = '#E88D9B';
                                    return;
                                }
                                const regex = new RegExp(pattern, flags);
                                const matches = [...text.matchAll(regex)];
                                if (matches.length === 0) {
                                    output.textContent = 'ℹ️ 没有匹配到任何内容';
                                    output.style.display = 'block';
                                    output.style.color = 'var(--text-secondary)';
                                } else {
                                    output.innerHTML = matches.map((m, i) =>
                                        `匹配 ${i + 1}: <strong>${m[0]}</strong> (位置: ${m.index})` +
                                        (m.groups ? '<br>命名分组: ' + JSON.stringify(m.groups) : '')
                                    ).join('<br>');
                                    output.style.display = 'block';
                                    output.style.color = 'var(--text-primary)';
                                }
                            } catch (e) {
                                output.textContent = '❌ 正则表达式错误：' + e.message;
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                            }
                        });
                        document.getElementById('btnRegexClear').addEventListener('click', () => {
                            patternInput.value = '';
                            flagsInput.value = '';
                            textInput.value = '';
                            output.style.display = 'none';
                        });
                        break;
                    }
                    case 'color-converter': {
                        const input = document.getElementById('colorInput');
                        const output = document.getElementById('colorOutput');
                        document.getElementById('btnConvert').addEventListener('click', () => {
                            const val = input.value.trim();
                            if (!val) {
                                output.textContent = '⚠️ 请输入颜色值';
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                                return;
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = 1;
                            canvas.height = 1;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = val;
                            try {
                                const computed = ctx.fillStyle;
                                if (computed === '#000000' && !val.toLowerCase().includes('black') &&
                                    !val.startsWith('#000') && val !== 'rgb(0,0,0)' && val !== 'rgb(0, 0, 0)') {
                                    if (!/^#|rgb|hsl/i.test(val)) throw new Error('无法解析');
                                }
                                const match = computed.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
                                if (match) {
                                    const r = parseInt(match[1]);
                                    const g = parseInt(match[2]);
                                    const b = parseInt(match[3]);
                                    const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
                                    const hsl = rgbToHsl(r, g, b);
                                    output.innerHTML = `
                      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
                        <div style="width:50px;height:50px;border-radius:12px;background:${computed};border:2px solid #ddd;flex-shrink:0;"></div>
                        <div>
                          <strong>HEX:</strong> ${hex}<br>
                          <strong>RGB:</strong> rgb(${r}, ${g}, ${b})<br>
                          <strong>HSL:</strong> hsl(${hsl.h}°, ${hsl.s}%, ${hsl.l}%)
                        </div>
                      </div>`;
                                    output.style.display = 'block';
                                    output.style.color = 'var(--text-primary)';
                                }
                            } catch (e) {
                                output.textContent = '❌ 无法解析该颜色值，请检查格式';
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                            }
                        });
                        document.getElementById('btnColorClear').addEventListener('click', () => {
                            input.value = '';
                            output.style.display = 'none';
                        });
                        break;
                    }
                    case 'timestamp': {
                        const input = document.getElementById('tsInput');
                        const output = document.getElementById('tsOutput');
                        document.getElementById('btnTsConvert').addEventListener('click', () => {
                            const val = input.value.trim();
                            if (!val) {
                                output.textContent = '⚠️ 请输入时间戳或日期';
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                                return;
                            }
                            if (/^\d+$/.test(val)) {
                                const ts = parseInt(val);
                                const date = new Date(ts * 1000);
                                output.innerHTML = `
                    <strong>时间戳（秒）：</strong> ${ts}<br>
                    <strong>UTC 时间：</strong> ${date.toUTCString()}<br>
                    <strong>本地时间：</strong> ${date.toLocaleString('zh-CN')}<br>
                    <strong>ISO 格式：</strong> ${date.toISOString()}`;
                            } else {
                                const date = new Date(val);
                                if (isNaN(date.getTime())) {
                                    output.textContent = '❌ 无法解析该日期字符串';
                                    output.style.color = '#E88D9B';
                                } else {
                                    output.innerHTML = `
                    <strong>本地时间：</strong> ${date.toLocaleString('zh-CN')}<br>
                    <strong>UTC 时间：</strong> ${date.toUTCString()}<br>
                    <strong>时间戳（秒）：</strong> ${Math.floor(date.getTime() / 1000)}<br>
                    <strong>时间戳（毫秒）：</strong> ${date.getTime()}`;
                                }
                            }
                            output.style.display = 'block';
                            output.style.color = 'var(--text-primary)';
                        });
                        document.getElementById('btnTsNow').addEventListener('click', () => {
                            const now = Math.floor(Date.now() / 1000);
                            input.value = now;
                            const date = new Date(now * 1000);
                            output.innerHTML = `
                  <strong>当前时间戳（秒）：</strong> ${now}<br>
                  <strong>本地时间：</strong> ${date.toLocaleString('zh-CN')}<br>
                  <strong>UTC 时间：</strong> ${date.toUTCString()}`;
                            output.style.display = 'block';
                            output.style.color = 'var(--text-primary)';
                        });
                        document.getElementById('btnTsClear').addEventListener('click', () => {
                            input.value = '';
                            output.style.display = 'none';
                        });
                        break;
                    }
                    case 'base64': {
                        const input = document.getElementById('b64Input');
                        const output = document.getElementById('b64Output');
                        document.getElementById('btnB64Encode').addEventListener('click', () => {
                            try {
                                output.textContent = btoa(unescape(encodeURIComponent(input.value)));
                                output.style.display = 'block';
                                output.style.color = 'var(--text-primary)';
                            } catch (e) {
                                output.textContent = '❌ 编码失败：' + e.message;
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                            }
                        });
                        document.getElementById('btnB64Decode').addEventListener('click', () => {
                            try {
                                output.textContent = decodeURIComponent(escape(atob(input.value)));
                                output.style.display = 'block';
                                output.style.color = 'var(--text-primary)';
                            } catch (e) {
                                output.textContent = '❌ 解码失败，请确认输入为有效的 Base64 字符串';
                                output.style.display = 'block';
                                output.style.color = '#E88D9B';
                            }
                        });
                        document.getElementById('btnB64Clear').addEventListener('click', () => {
                            input.value = '';
                            output.style.display = 'none';
                        });
                        break;
                    }
                    case 'word-count': {
                        const input = document.getElementById('wcInput');
                        const output = document.getElementById('wcOutput');
                        document.getElementById('btnWcCount').addEventListener('click', () => {
                            const text = input.value;
                            const charCount = text.length;
                            const charNoSpace = text.replace(/\s/g, '').length;
                            const chineseChars = (text.match(/[\u4e00-\u9fff]/g) || []).length;
                            const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
                            const lines = text.split(/\n/).length;
                            const paragraphs = text.split(/\n\n+/).filter(p => p.trim()).length;
                            output.innerHTML = `
                  <strong>总字符数（含空格）：</strong> ${charCount}<br>
                  <strong>总字符数（不含空格）：</strong> ${charNoSpace}<br>
                  <strong>中文字符数：</strong> ${chineseChars}<br>
                  <strong>英文单词数：</strong> ${englishWords}<br>
                  <strong>行数：</strong> ${lines}<br>
                  <strong>段落数：</strong> ${paragraphs}`;
                            output.style.display = 'block';
                            output.style.color = 'var(--text-primary)';
                        });
                        document.getElementById('btnWcClear').addEventListener('click', () => {
                            input.value = '';
                            output.style.display = 'none';
                        });
                        break;
                    }
                }
            }

            function rgbToHsl(r, g, b) {
                r /= 255;
                g /= 255;
                b /= 255;
                const max = Math.max(r, g, b),
                    min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;
                if (max === min) {
                    h = s = 0;
                } else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r:
                            h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
                            break;
                        case g:
                            h = ((b - r) / d + 2) / 6;
                            break;
                        case b:
                            h = ((r - g) / d + 4) / 6;
                            break;
                    }
                }
                return {
                    h: Math.round(h * 360),
                    s: Math.round(s * 100),
                    l: Math.round(l * 100),
                };
            }
