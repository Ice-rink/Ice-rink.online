<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化 · 冰凌呀的小栈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/lib/all.css">
    <style>
        :root {
            --sakura-pink: #FADADD;
            --sakura-mid: #F4B8C1;
            --sakura-deep: #E88D9B;
            --text-primary: #4A3F4A;
            --text-secondary: #7A6F7A;
            --text-light: #A89DA8;
            --white-card: rgba(255, 255, 255, 0.75);
            --shadow-soft: 0 4px 20px rgba(200, 160, 180, 0.18);
            --radius-md: 18px;
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
            background: linear-gradient(170deg, #FDE8EC, #FDF2F8, #F8F0F8, #F0F0FA, #F0F6FA, #F5F0F8, #FDE8EC);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .tool-container {
            background: var(--white-card);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-soft);
            max-width: 700px;
            width: 100%;
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tool-header h1 {
            font-size: 1.4rem;
            color: var(--text-primary);
        }

        .tool-header a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: auto;
        }

        .tool-header a:hover {
            color: var(--sakura-deep);
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 14px;
            border: 2px solid #F0E0E8;
            border-radius: var(--radius-md);
            font-family: monospace;
            font-size: 0.9rem;
            background: rgba(255, 250, 252, 0.8);
            color: var(--text-primary);
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--sakura-mid);
            box-shadow: 0 0 0 4px rgba(244, 184, 193, 0.15);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin: 14px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-p {
            background: linear-gradient(135deg, #F4B8C1, #E88D9B);
            color: #fff;
        }

        .btn-p:hover {
            box-shadow: 0 6px 20px rgba(232, 141, 155, 0.4);
            transform: translateY(-1px);
        }

        .btn-s {
            background: #fff;
            color: var(--text-secondary);
            border: 1px solid rgba(220, 200, 210, 0.5);
        }

        .btn-s:hover {
            color: var(--sakura-deep);
        }

        .output {
            padding: 16px;
            background: rgba(248, 240, 245, 0.6);
            border-radius: var(--radius-md);
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(230, 200, 210, 0.3);
            min-height: 60px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--sakura-deep);
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transform: translateY(-10px);
            transition: 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="tool-container">
        <div class="tool-header">
            <span style="font-size:2rem;">🔧</span>
            <h1>JSON 格式化</h1>
            <a href="../"><i class="fas fa-arrow-left"></i> 返回工具列表</a>
        </div>
        <textarea id="input" placeholder='{"name":"冰凌呀","emoji":"❄️"}'></textarea>
        <div class="btn-row">
            <button class="btn btn-p" onclick="format()">✨ 格式化</button>
            <button class="btn btn-s" onclick="minify()">📦 压缩</button>
            <button class="btn btn-s" onclick="validate()">✅ 验证</button>
            <button class="btn btn-s" onclick="copyOutput()">📋 复制结果</button>
            <button class="btn btn-s" onclick="clearAll()">🗑 清空</button>
        </div>
        <div class="output" id="output" style="color:var(--text-light);">结果将显示在这里...</div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // JSON 格式化工具逻辑

        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const toast = document.getElementById('toast');

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1800);
        }

        function setOutput(text, isError = false) {
            output.textContent = text;
            output.style.color = isError ? '#E88D9B' : 'var(--text-primary)';
        }

        function getInput() {
            const val = input.value.trim();
            if (!val) { setOutput('⚠️ 请输入 JSON 数据', true); return null; }
            return val;
        }

        function format() {
            const val = getInput();
            if (!val) return;
            try {
                const obj = JSON.parse(val);
                setOutput(JSON.stringify(obj, null, 2));
            } catch (e) {
                setOutput('❌ JSON 格式错误：' + e.message, true);
            }
        }

        function minify() {
            const val = getInput();
            if (!val) return;
            try {
                const obj = JSON.parse(val);
                setOutput(JSON.stringify(obj));
            } catch (e) {
                setOutput('❌ JSON 格式错误：' + e.message, true);
            }
        }

        function validate() {
            const val = getInput();
            if (!val) return;
            try {
                JSON.parse(val);
                setOutput('✅ JSON 格式正确！');
            } catch (e) {
                setOutput('❌ JSON 格式错误：' + e.message, true);
            }
        }

        function copyOutput() {
            const text = output.textContent;
            if (!text || text.includes('结果将显示在这里') || text.startsWith('⚠️') || text.startsWith('❌')) {
                showToast('⚠️ 没有可复制的结果');
                return;
            }
            navigator.clipboard.writeText(text).then(() => showToast('📋 已复制到剪贴板'));
        }

        function clearAll() {
            input.value = '';
            setOutput('结果将显示在这里...');
            output.style.color = 'var(--text-light)';
        }
    </script>
</body>

</html>
