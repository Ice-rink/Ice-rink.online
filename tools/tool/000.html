<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰凌の小栈 | 工具站模板</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <link rel="stylesheet" href="/lib/all.css">
    <style>
        /* 模板额外样式 */
        .template-header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .template-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .template-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* 返回按钮区域 */
        .back-bar {
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(230, 200, 210, 0.5);
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            box-shadow: var(--shadow-soft);
        }

        .back-btn:hover {
            color: var(--sakura-deep);
            background: var(--white-card-hover);
            transform: translateX(-3px);
            box-shadow: var(--shadow-card);
        }

        /* 主内容卡片区域 - 可自由填充 */
        .content-card {
            background: var(--white-card);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            margin-bottom: 40px;
        }

        .content-card:hover {
            box-shadow: var(--shadow-hover);
            background: var(--white-card-hover);
        }

        /* 装饰性占位内容 */
        .placeholder-icon {
            text-align: center;
            font-size: 4rem;
            margin-bottom: 24px;
            opacity: 0.6;
        }

        .placeholder-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .placeholder-desc {
            text-align: center;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .placeholder-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--sakura-pink), var(--sakura-deep));
            margin: 24px auto;
            border-radius: 3px;
        }

        /* 功能卡片网格示例 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-md);
            padding: 24px 20px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(230, 200, 210, 0.3);
        }

        .feature-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--sakura-mid);
        }

        .feature-card i {
            font-size: 2rem;
            color: var(--sakura-deep);
            margin-bottom: 12px;
        }

        .feature-card h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .feature-card p {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .content-card {
                padding: 24px 20px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    <div class="sakura-container" id="sakuraContainer"></div>

    <main class="container">
        <!-- 返回按钮栏 -->
        <div class="back-bar" data-aos="fade-up">
            <a href="/tools/" class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回工具列表
            </a>
        </div>

        <!-- 页面头部 -->
        <div class="template-header" data-aos="fade-up">
            <h1>✨ 工具名称</h1>
            <p>这里是一句简短的描述，说明这个工具的用途</p>
        </div>

        <!-- 主要内容卡片 -->
        <div class="content-card" data-aos="fade-up" data-aos-duration="600">
            <div class="placeholder-icon">
                <i class="fas fa-tools"></i>
            </div>
            <div class="placeholder-title">
                工具功能区域
            </div>
            <div class="placeholder-divider"></div>
            <div class="placeholder-desc">
                在这里放置工具的实际功能界面。<br>
                可以添加输入框、按钮、拖拽区域等交互元素。
            </div>

            <!-- 示例功能卡片网格（仅为样式展示，无实际功能） -->
            <div class="feature-grid">
                <div class="feature-card">
                    <i class="fas fa-crop-alt"></i>
                    <h4>功能一</h4>
                    <p>功能的简短说明</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-sliders-h"></i>
                    <h4>功能二</h4>
                    <p>功能的简短说明</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-download"></i>
                    <h4>功能三</h4>
                    <p>功能的简短说明</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-undo-alt"></i>
                    <h4>功能四</h4>
                    <p>功能的简短说明</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer" data-aos="fade-up" data-aos-duration="700">
        <p style="margin-top:4px;font-size:0.78rem;">© 2026 Ice_rink · 保持好奇，保持温柔</p>
        <p>Made with <span class="footer-heart">💗</span> by <a href="https://github.com/Ice-rink" target="_blank"
                rel="noopener">Ice_rink</a> · 冰凌呀 & <a href="https://chat.deepseek.com/" target="_blank"
                rel="noopener">DeepSeek</a> v4 Pro</p>
    </footer>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" title="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- 脚本引入 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="/lib/all.js"></script>

    <script>
        (function () {
            // 初始化 AOS 动画
            AOS.init({ duration: 700, once: true });

            // 可选：为返回按钮添加平滑返回记录
            const backBtn = document.querySelector('.back-btn');
            if (backBtn) {
                backBtn.addEventListener('click', function (e) {
                    // 如果 href 是有效的链接，正常跳转；否则回退历史记录
                    const href = this.getAttribute('href');
                    if (href === '#') {
                        e.preventDefault();
                        window.history.back();
                    }
                });
            }

            console.log('✨ 工具站模板已加载，可以开始添加实际功能了~');
        })();
    </script>
</body>

</html>
