<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰凌の小栈 | TTS语音合成</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <link rel="stylesheet" href="/lib/all.css">
    <style>
        /* ========== TTS工具专属样式 ========== */
        .template-header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .template-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .template-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* API来源说明 */
        .api-credit {
            text-align: center;
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .api-credit a {
            color: var(--sakura-deep);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dashed rgba(200, 120, 150, 0.5);
            transition: var(--transition);
        }

        .api-credit a:hover {
            color: #c44a6a;
            border-bottom-color: #c44a6a;
        }

        .back-bar {
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(230, 200, 210, 0.5);
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
            box-shadow: var(--shadow-soft);
        }

        .back-btn:hover {
            color: var(--sakura-deep);
            background: var(--white-card-hover);
            transform: translateX(-3px);
            box-shadow: var(--shadow-card);
        }

        /* 主内容卡片 */
        .content-card {
            background: var(--white-card);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            margin-bottom: 40px;
        }

        .content-card:hover {
            box-shadow: var(--shadow-hover);
            background: var(--white-card-hover);
        }

        /* 分区标题 */
        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            letter-spacing: 0.02em;
        }

        .section-label i {
            color: var(--sakura-deep);
            font-size: 0.9rem;
        }

        /* 模型选择行 */
        .model-select-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .model-select-wrapper {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .model-select-wrapper select {
            width: 100%;
            padding: 12px 40px 12px 16px;
            font-size: 0.95rem;
            font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
            font-weight: 500;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid rgba(220, 190, 200, 0.5);
            border-radius: 14px;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
        }

        .model-select-wrapper select:hover {
            border-color: var(--sakura-mid);
            background: rgba(255, 255, 255, 0.85);
        }

        .model-select-wrapper select:focus {
            border-color: var(--sakura-deep);
            box-shadow: 0 0 0 3px rgba(220, 150, 170, 0.15);
            background: #fff;
        }

        .model-select-wrapper select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(240, 235, 238, 0.5);
        }

        .model-select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--sakura-deep);
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .refresh-btn {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid rgba(220, 190, 200, 0.5);
            background: rgba(255, 255, 255, 0.6);
            color: var(--sakura-deep);
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .refresh-btn:hover {
            background: rgba(255, 240, 245, 0.9);
            border-color: var(--sakura-mid);
            transform: rotate(30deg);
        }

        .refresh-btn:active {
            transform: rotate(180deg) scale(0.92);
        }

        .refresh-btn.loading-refresh {
            pointer-events: none;
            animation: spinRefresh 0.8s linear infinite;
        }

        @keyframes spinRefresh {
            to {
                transform: rotate(360deg);
            }
        }

        /* 文本输入区 */
        .textarea-wrapper {
            position: relative;
            margin-bottom: 6px;
        }

        .textarea-wrapper textarea {
            width: 100%;
            min-height: 160px;
            padding: 16px 18px;
            font-size: 0.95rem;
            font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
            line-height: 1.7;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid rgba(220, 190, 200, 0.5);
            border-radius: 16px;
            resize: vertical;
            transition: var(--transition);
            outline: none;
            box-sizing: border-box;
        }

        .textarea-wrapper textarea:hover {
            border-color: var(--sakura-mid);
            background: rgba(255, 255, 255, 0.85);
        }

        .textarea-wrapper textarea:focus {
            border-color: var(--sakura-deep);
            box-shadow: 0 0 0 3px rgba(220, 150, 170, 0.12);
            background: #fff;
        }

        .textarea-wrapper textarea::placeholder {
            color: #c4b5ba;
            font-weight: 300;
        }

        /* 文本信息栏 */
        .text-info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.78rem;
            color: var(--text-light);
        }

        .char-count {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(255, 240, 245, 0.6);
            border-radius: 20px;
            font-weight: 500;
            transition: var(--transition);
        }

        .char-count.warning {
            color: #e08860;
            background: rgba(255, 220, 200, 0.5);
        }

        .char-count.over-limit {
            color: #d4566a;
            background: rgba(255, 200, 200, 0.5);
            animation: pulse-warn 1.5s ease-in-out infinite;
        }

        @keyframes pulse-warn {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.55;
            }
        }

        .sample-text-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: none;
            border: none;
            color: var(--sakura-deep);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
            transition: var(--transition);
            font-family: inherit;
        }

        .sample-text-btn:hover {
            background: rgba(255, 220, 235, 0.5);
            color: #c44a6a;
        }

        .sample-text-btn i {
            font-size: 0.7rem;
        }

        /* 操作按钮区 */
        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 24px;
        }

        .btn-synthesize {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 32px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #e8a0b4, #d4788f);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 6px 20px rgba(210, 120, 145, 0.3);
            letter-spacing: 0.03em;
            position: relative;
            overflow: hidden;
        }

        .btn-synthesize:hover:not(:disabled) {
            background: linear-gradient(135deg, #e590a8, #c85e78);
            box-shadow: 0 8px 28px rgba(200, 100, 130, 0.4);
            transform: translateY(-2px);
        }

        .btn-synthesize:active:not(:disabled) {
            transform: translateY(0) scale(0.97);
            box-shadow: 0 4px 14px rgba(200, 100, 130, 0.3);
        }

        .btn-synthesize:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(15%);
        }

        .btn-synthesize .spinner-icon {
            animation: spinRefresh 0.7s linear infinite;
        }

        .btn-clear {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 22px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(210, 190, 200, 0.45);
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(6px);
        }

        .btn-clear:hover {
            background: rgba(255, 240, 245, 0.7);
            border-color: var(--sakura-mid);
            color: #c45a70;
        }

        /* 自动播放切换按钮 */
        .auto-play-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(210, 190, 200, 0.45);
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(6px);
            user-select: none;
        }

        .auto-play-toggle:hover {
            background: rgba(255, 240, 245, 0.7);
            border-color: var(--sakura-mid);
        }

        .auto-play-toggle.active {
            background: linear-gradient(135deg, #d4a0b8, #b87088);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(180, 100, 130, 0.3);
        }

        .auto-play-toggle.active i {
            color: #fff;
        }

        .auto-play-toggle i {
            font-size: 0.9rem;
            color: var(--sakura-deep);
            transition: var(--transition);
        }

        /* 状态提示 */
        .status-message {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .status-message.visible {
            opacity: 1;
            max-height: 60px;
            pointer-events: auto;
        }

        .status-message.info {
            background: rgba(220, 210, 240, 0.45);
            color: #5a4a7a;
            border: 1px solid rgba(180, 160, 210, 0.4);
        }

        .status-message.success {
            background: rgba(200, 230, 210, 0.45);
            color: #3a6a4a;
            border: 1px solid rgba(150, 210, 170, 0.5);
        }

        .status-message.error {
            background: rgba(255, 210, 210, 0.5);
            color: #a04040;
            border: 1px solid rgba(240, 170, 170, 0.5);
        }

        /* 结果区域 */
        .result-area {
            display: none;
            padding: 20px 18px;
            background: rgba(255, 248, 250, 0.6);
            border-radius: 16px;
            border: 1.5px solid rgba(220, 190, 200, 0.4);
            transition: var(--transition);
            animation: fadeSlideIn 0.4s ease;
        }

        .result-area.visible {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-area .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 14px;
        }

        .result-area .result-header i {
            color: var(--sakura-deep);
        }

        .result-area audio {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 14px;
            outline: none;
        }

        .result-area audio::-webkit-media-controls-panel {
            background: rgba(255, 245, 248, 0.8);
            border-radius: 10px;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, #a0c8e0, #7aadc8);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 14px rgba(120, 160, 190, 0.3);
        }

        .btn-download:hover {
            background: linear-gradient(135deg, #8ab8d4, #6098b8);
            box-shadow: 0 6px 20px rgba(100, 150, 180, 0.4);
            transform: translateY(-2px);
        }

        .btn-download:active {
            transform: translateY(0) scale(0.96);
        }

        .btn-copy-url {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid rgba(210, 190, 200, 0.45);
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(6px);
        }

        .btn-copy-url:hover {
            background: rgba(255, 240, 245, 0.7);
            border-color: var(--sakura-mid);
            color: var(--sakura-deep);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .content-card {
                padding: 24px 18px;
            }

            .model-select-row {
                flex-direction: column;
                gap: 8px;
            }

            .model-select-wrapper {
                min-width: 100%;
            }

            .refresh-btn {
                align-self: flex-end;
                width: 40px;
                height: 40px;
                font-size: 0.9rem;
            }

            .action-row {
                flex-direction: column;
            }

            .btn-synthesize,
            .btn-clear,
            .auto-play-toggle {
                width: 100%;
                justify-content: center;
                text-align: center;
            }

            .textarea-wrapper textarea {
                min-height: 130px;
                font-size: 0.9rem;
                padding: 14px;
            }

            .result-actions {
                flex-direction: column;
            }

            .btn-download,
            .btn-copy-url {
                width: 100%;
                justify-content: center;
                text-align: center;
            }

            .text-info-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 400px) {
            .template-header h1 {
                font-size: 1.5rem;
            }

            .btn-synthesize {
                padding: 11px 22px;
                font-size: 0.9rem;
            }

            .textarea-wrapper textarea {
                min-height: 110px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    <div class="sakura-container" id="sakuraContainer"></div>

    <main class="container">
        <!-- 返回按钮栏 -->
        <div class="back-bar" data-aos="fade-up">
            <a href="/tools/" class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回工具列表
            </a>
        </div>

        <!-- 页面头部 -->
        <div class="template-header" data-aos="fade-up">
            <h1>🎙️ TTS语音合成</h1>
            <p>输入文本，选择音色，一键生成自然流畅的语音</p>
            <div class="api-credit">
                <i class="fas fa-cloud"></i> 语音合成服务由
                <a href="https://api.milorapart.top/" target="_blank" rel="noopener">api.milorapart.top</a>
                提供支持
            </div>
        </div>

        <!-- 主要内容卡片 -->
        <div class="content-card" data-aos="fade-up" data-aos-duration="600">
            <!-- 模型选择 -->
            <div class="section-label">
                <i class="fas fa-user-tie"></i> 选择音色
            </div>
            <div class="model-select-row">
                <div class="model-select-wrapper">
                    <select id="speakerSelect" disabled>
                        <option value="">加载中...</option>
                    </select>
                </div>
                <button class="refresh-btn" id="refreshBtn" title="刷新模型列表" aria-label="刷新模型列表">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>

            <!-- 文本输入 -->
            <div class="section-label">
                <i class="fas fa-pen-fancy"></i> 输入文本
            </div>
            <div class="textarea-wrapper">
                <textarea id="textInput" placeholder="在此输入要合成语音的文本内容...&#10;&#10;例如：你好，欢迎使用TTS语音合成工具，希望你喜欢这个音色。"
                    maxlength="2000"></textarea>
            </div>
            <div class="text-info-bar">
                <span class="char-count" id="charCount">
                    <i class="fas fa-text-width"></i> <span id="charNum">0</span> / 2000 字
                </span>
                <button class="sample-text-btn" id="sampleTextBtn">
                    <i class="fas fa-lightbulb"></i> 使用示例文本
                </button>
            </div>

            <!-- 状态提示 -->
            <div class="status-message" id="statusMessage"></div>

            <!-- 操作按钮 -->
            <div class="action-row">
                <button class="btn-synthesize" id="synthesizeBtn" disabled>
                    <i class="fas fa-microphone-alt"></i> 开始合成
                </button>
                <button class="btn-clear" id="clearBtn">
                    <i class="fas fa-eraser"></i> 清空文本
                </button>
                <button class="auto-play-toggle" id="autoPlayToggle" title="合成后自动播放音频">
                    <i class="fas fa-play-circle"></i> 自动播放
                </button>
            </div>

            <!-- 结果区域 -->
            <div class="result-area" id="resultArea">
                <div class="result-header">
                    <i class="fas fa-headphones"></i> 合成结果
                </div>
                <audio id="audioPlayer" controls preload="auto"></audio>
                <div class="result-actions">
                    <button class="btn-download" id="downloadBtn">
                        <i class="fas fa-download"></i> 下载音频
                    </button>
                    <button class="btn-copy-url" id="copyUrlBtn">
                        <i class="fas fa-copy"></i> 复制音频链接
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer" data-aos="fade-up" data-aos-duration="700">
        <p style="margin-top:4px;font-size:0.78rem;">© 2026 Ice_rink · 保持好奇，保持温柔</p>
        <p>Made with <span class="footer-heart">💗</span> by <a href="https://github.com/Ice-rink" target="_blank"
                rel="noopener">Ice_rink</a> · 冰凌呀 & <a href="https://chat.deepseek.com/" target="_blank"
                rel="noopener">DeepSeek</a> v4 Pro</p>
    </footer>

    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop" title="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- 脚本引入 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js">
    </script>
    <script src="/lib/all.js">
    </script>

    <script>
        (function () {
            // ============ 初始化 AOS 动画 ============
            AOS.init({ duration: 700, once: true });

            // ============ DOM 元素引用 ============
            const speakerSelect = document.getElementById('speakerSelect');
            const refreshBtn = document.getElementById('refreshBtn');
            const textInput = document.getElementById('textInput');
            const charCountEl = document.getElementById('charCount');
            const charNumEl = document.getElementById('charNum');
            const sampleTextBtn = document.getElementById('sampleTextBtn');
            const statusMessage = document.getElementById('statusMessage');
            const synthesizeBtn = document.getElementById('synthesizeBtn');
            const clearBtn = document.getElementById('clearBtn');
            const autoPlayToggle = document.getElementById('autoPlayToggle');
            const resultArea = document.getElementById('resultArea');
            const audioPlayer = document.getElementById('audioPlayer');
            const downloadBtn = document.getElementById('downloadBtn');
            const copyUrlBtn = document.getElementById('copyUrlBtn');
            const backBtn = document.querySelector('.back-btn');

            // ============ 常量 ============
            const API_BASE = 'https://api.milorapart.top/apis/AIvoice/';
            const MAX_CHARS = 2000;
            const WARN_CHARS = 1600;
            const SAMPLE_TEXT = '你好，这是一段语音合成测试文本，用于体验不同音色的效果。希望你喜欢这个工具，祝你使用愉快！';
            const STORAGE_KEY_SPEAKER = 'tts_selected_speaker';
            const STORAGE_KEY_AUTOPLAY = 'tts_autoplay_enabled';

            // ============ 状态变量 ============
            let speakersList = [];
            let currentAudioUrl = null;
            let isSynthesizing = false;
            let isSpeakersLoading = false;
            let autoPlayEnabled = false; // 默认关闭

            // ============ 初始化自动播放状态 ============
            function loadAutoPlaySetting() {
                const saved = localStorage.getItem(STORAGE_KEY_AUTOPLAY);
                if (saved === 'true') {
                    autoPlayEnabled = true;
                    autoPlayToggle.classList.add('active');
                } else {
                    autoPlayEnabled = false;
                    autoPlayToggle.classList.remove('active');
                }
            }

            function saveAutoPlaySetting(enabled) {
                localStorage.setItem(STORAGE_KEY_AUTOPLAY, enabled ? 'true' : 'false');
            }

            // ============ 工具函数 ============
            function showStatus(msg, type = 'info', duration = 0) {
                statusMessage.textContent = msg;
                statusMessage.className = 'status-message visible ' + type;
                if (showStatus._timeout) clearTimeout(showStatus._timeout);
                if (duration > 0) {
                    showStatus._timeout = setTimeout(() => {
                        statusMessage.classList.remove('visible');
                    }, duration);
                }
            }

            function hideStatus() {
                statusMessage.classList.remove('visible');
            }

            function normalizeSpeaker(raw) {
                if (typeof raw === 'string') {
                    return { value: raw.trim(), label: raw.trim() };
                }
                if (typeof raw === 'object' && raw !== null) {
                    const value = raw.id || raw.speaker || raw.value || raw.name || raw.key || '';
                    const label = raw.name || raw.label || raw.display || raw.speaker || value || '';
                    return { value: String(value).trim(), label: String(label).trim() };
                }
                return null;
            }

            function updateCharCount() {
                const len = textInput.value.length;
                charNumEl.textContent = len;
                charCountEl.classList.remove('warning', 'over-limit');
                if (len >= MAX_CHARS) {
                    charCountEl.classList.add('over-limit');
                } else if (len >= WARN_CHARS) {
                    charCountEl.classList.add('warning');
                }
                updateSynthesizeBtnState();
            }

            function updateSynthesizeBtnState() {
                const hasText = textInput.value.trim().length > 0;
                const hasSpeaker = speakerSelect.value && speakerSelect.value !== '' && speakersList.length > 0;
                const notOverLimit = textInput.value.length <= MAX_CHARS;
                const notLoading = !isSynthesizing;
                synthesizeBtn.disabled = !(hasText && hasSpeaker && notOverLimit && notLoading);
            }

            function setSynthesizing(active) {
                isSynthesizing = active;
                if (active) {
                    synthesizeBtn.disabled = true;
                    synthesizeBtn.innerHTML =
                        '<i class="fas fa-spinner spinner-icon"></i> 合成中，请稍候...';
                    textInput.disabled = true;
                    speakerSelect.disabled = true;
                    refreshBtn.disabled = true;
                } else {
                    synthesizeBtn.innerHTML =
                        '<i class="fas fa-microphone-alt"></i> 开始合成';
                    textInput.disabled = false;
                    speakerSelect.disabled = false;
                    refreshBtn.disabled = false;
                    updateSynthesizeBtnState();
                }
            }

            // ============ API 调用 ============
            async function fetchSpeakers() {
                if (isSpeakersLoading) return;
                isSpeakersLoading = true;

                speakerSelect.disabled = true;
                speakerSelect.innerHTML = '<option value="">加载中...</option>';
                refreshBtn.classList.add('loading-refresh');
                hideStatus();

                try {
                    const response = await fetch(API_BASE + '?type=list', {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' },
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    let rawSpeakers = null;

                    if (data && Array.isArray(data.speakers)) {
                        rawSpeakers = data.speakers;
                    } else if (data && Array.isArray(data.data)) {
                        rawSpeakers = data.data;
                    } else if (data && Array.isArray(data.list)) {
                        rawSpeakers = data.list;
                    } else if (Array.isArray(data)) {
                        rawSpeakers = data;
                    }

                    if (!rawSpeakers || rawSpeakers.length === 0) {
                        throw new Error('返回的模型列表为空');
                    }

                    speakersList = rawSpeakers
                        .map(normalizeSpeaker)
                        .filter(s => s && s.value && s.label);

                    if (speakersList.length === 0) {
                        throw new Error('无法解析模型列表数据');
                    }

                    populateSpeakerSelect();
                    showStatus(`成功加载 ${speakersList.length} 个音色模型`, 'success', 2500);
                    console.log('✅ 音色模型列表已加载:', speakersList.length, '个');

                } catch (error) {
                    console.error('❌ 获取模型列表失败:', error);
                    speakerSelect.innerHTML = '<option value="">加载失败，请刷新重试</option>';
                    speakerSelect.disabled = false;
                    speakersList = [];
                    showStatus('模型列表加载失败：' + error.message + '，请点击刷新按钮重试', 'error', 6000);
                } finally {
                    isSpeakersLoading = false;
                    refreshBtn.classList.remove('loading-refresh');
                    speakerSelect.disabled = false;
                    updateSynthesizeBtnState();
                }
            }

            function populateSpeakerSelect() {
                const savedSpeaker = localStorage.getItem(STORAGE_KEY_SPEAKER);
                speakerSelect.innerHTML = '';

                const defaultOption = document.createElement('option');
                defaultOption.value = '';
                defaultOption.textContent = speakersList.length > 0 ?
                    `— 请选择音色（共${speakersList.length}个）—` :
                    '暂无可用模型';
                defaultOption.disabled = true;
                defaultOption.selected = true;
                speakerSelect.appendChild(defaultOption);

                let foundSaved = false;
                speakersList.forEach((speaker) => {
                    const option = document.createElement('option');
                    option.value = speaker.value;
                    option.textContent = speaker.label;
                    if (savedSpeaker && speaker.value === savedSpeaker) {
                        option.selected = true;
                        defaultOption.selected = false;
                        foundSaved = true;
                    }
                    speakerSelect.appendChild(option);
                });

                if (!foundSaved && speakersList.length > 0 && savedSpeaker === null) {
                    speakerSelect.options[1] && (speakerSelect.options[1].selected = true);
                    defaultOption.selected = false;
                }

                speakerSelect.disabled = false;
                updateSynthesizeBtnState();
            }

            async function synthesizeSpeech(text, speaker) {
                const encodedText = encodeURIComponent(text);
                const encodedSpeaker = encodeURIComponent(speaker);
                const url = `${API_BASE}?text=${encodedText}&speaker=${encodedSpeaker}`;

                console.log('🔊 请求语音合成:', url.substring(0, 120) + '...');

                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (!data || !data.url) {
                    throw new Error('API返回数据中未找到音频URL');
                }

                let audioUrl = data.url;
                if (!audioUrl.startsWith('http://') && !audioUrl.startsWith('https://')) {
                    if (audioUrl.startsWith('/')) {
                        const apiOrigin = new URL(API_BASE).origin;
                        audioUrl = apiOrigin + audioUrl;
                    } else {
                        audioUrl = API_BASE.replace(/\/?$/, '/') + audioUrl;
                    }
                }

                return audioUrl;
            }

            // ============ UI 事件处理 ============
            synthesizeBtn.addEventListener('click', async () => {
                const text = textInput.value.trim();
                const speaker = speakerSelect.value;

                if (!text) {
                    showStatus('请先输入要合成的文本内容', 'info', 3000);
                    return;
                }
                if (!speaker) {
                    showStatus('请先选择一个音色模型', 'info', 3000);
                    return;
                }
                if (text.length > MAX_CHARS) {
                    showStatus(`文本超过${MAX_CHARS}字上限，请精简后再试`, 'error', 3000);
                    return;
                }

                resultArea.classList.remove('visible');
                audioPlayer.src = '';
                currentAudioUrl = null;
                hideStatus();

                setSynthesizing(true);

                try {
                    const audioUrl = await synthesizeSpeech(text, speaker);
                    currentAudioUrl = audioUrl;
                    console.log('✅ 语音合成成功:', audioUrl);

                    audioPlayer.src = audioUrl;
                    audioPlayer.load();
                    resultArea.classList.add('visible');
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                    showStatus('语音合成成功！', 'success', 4000);

                    // 保存选中的speaker
                    localStorage.setItem(STORAGE_KEY_SPEAKER, speaker);

                    // 自动播放逻辑
                    if (autoPlayEnabled) {
                        // 等待音频可以播放后自动播放
                        const playPromise = new Promise((resolve) => {
                            audioPlayer.addEventListener('canplay', () => {
                                audioPlayer.play().then(resolve).catch(() => resolve());
                            }, { once: true });
                            // 如果已经可以播放，直接尝试
                            if (audioPlayer.readyState >= 2) {
                                audioPlayer.play().then(resolve).catch(() => resolve());
                            }
                        });
                        await playPromise;
                        console.log('▶️ 自动播放已触发');
                    }

                } catch (error) {
                    console.error('❌ 语音合成失败:', error);
                    showStatus('合成失败：' + error.message, 'error', 6000);
                    resultArea.classList.remove('visible');
                    currentAudioUrl = null;
                } finally {
                    setSynthesizing(false);
                }
            });

            downloadBtn.addEventListener('click', async () => {
                if (!currentAudioUrl) {
                    showStatus('没有可下载的音频', 'info', 2000);
                    return;
                }

                try {
                    showStatus('正在准备下载...', 'info');
                    const response = await fetch(currentAudioUrl);
                    if (!response.ok) throw new Error('下载失败');
                    const blob = await response.blob();

                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    const urlPath = new URL(currentAudioUrl).pathname;
                    const fileName = urlPath.substring(urlPath.lastIndexOf('/') + 1) || 'tts_audio.mp3';
                    if (!fileName.includes('.')) {
                        a.download = fileName + '.mp3';
                    } else {
                        a.download = fileName;
                    }
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);

                    showStatus('下载已开始', 'success', 2500);
                } catch (error) {
                    console.warn('blob下载失败，尝试直接打开:', error.message);
                    window.open(currentAudioUrl, '_blank');
                    showStatus('已在新标签页打开音频链接', 'info', 3000);
                }
            });

            copyUrlBtn.addEventListener('click', async () => {
                if (!currentAudioUrl) {
                    showStatus('没有可复制的音频链接', 'info', 2000);
                    return;
                }
                try {
                    await navigator.clipboard.writeText(currentAudioUrl);
                    showStatus('音频链接已复制到剪贴板', 'success', 2500);
                } catch (error) {
                    const tempInput = document.createElement('input');
                    tempInput.value = currentAudioUrl;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                    showStatus('音频链接已复制到剪贴板', 'success', 2500);
                }
            });

            refreshBtn.addEventListener('click', () => {
                if (isSpeakersLoading) return;
                speakersList = [];
                speakerSelect.innerHTML = '<option value="">加载中...</option>';
                speakerSelect.disabled = true;
                resultArea.classList.remove('visible');
                audioPlayer.src = '';
                currentAudioUrl = null;
                hideStatus();
                fetchSpeakers();
            });

            clearBtn.addEventListener('click', () => {
                textInput.value = '';
                updateCharCount();
                resultArea.classList.remove('visible');
                audioPlayer.src = '';
                currentAudioUrl = null;
                hideStatus();
                textInput.focus();
                showStatus('文本已清空', 'info', 1800);
            });

            sampleTextBtn.addEventListener('click', () => {
                textInput.value = SAMPLE_TEXT;
                updateCharCount();
                resultArea.classList.remove('visible');
                audioPlayer.src = '';
                currentAudioUrl = null;
                hideStatus();
                showStatus('已填入示例文本，选择一个音色后即可合成', 'info', 2500);
                textInput.focus();
            });

            textInput.addEventListener('input', () => {
                updateCharCount();
            });

            speakerSelect.addEventListener('change', () => {
                updateSynthesizeBtnState();
                if (speakerSelect.value) {
                    localStorage.setItem(STORAGE_KEY_SPEAKER, speakerSelect.value);
                }
            });

            // 自动播放切换按钮
            autoPlayToggle.addEventListener('click', () => {
                autoPlayEnabled = !autoPlayEnabled;
                if (autoPlayEnabled) {
                    autoPlayToggle.classList.add('active');
                    showStatus('已开启自动播放，合成后将立即播放', 'info', 2000);
                } else {
                    autoPlayToggle.classList.remove('active');
                    showStatus('已关闭自动播放', 'info', 2000);
                }
                saveAutoPlaySetting(autoPlayEnabled);
            });

            if (backBtn) {
                backBtn.addEventListener('click', function (e) {
                    const href = this.getAttribute('href');
                    if (href === '#') {
                        e.preventDefault();
                        window.history.back();
                    }
                });
            }

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    if (!synthesizeBtn.disabled) {
                        synthesizeBtn.click();
                    }
                }
            });

            // ============ 初始化 ============
            function init() {
                loadAutoPlaySetting();
                updateCharCount();
                resultArea.classList.remove('visible');
                hideStatus();
                fetchSpeakers();

                console.log('✨ TTS语音合成工具已就绪');
                console.log('   💡 提示：输入文本后按 Ctrl+Enter 可快速合成');
                console.log('   🔊 自动播放状态：', autoPlayEnabled ? '开启' : '关闭');
            }

            init();
        })();
    </script>
</body>

</html>
