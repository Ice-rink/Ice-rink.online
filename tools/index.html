<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰凌の小栈 | 工具</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <link rel="stylesheet" href="/lib/all.css">
    <style>


        /* 头部 */
        .page-header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .page-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* 搜索 + 标签 */
        .filter-section {
            margin: 20px 0 30px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--white-card);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 10px 20px;
            border: 1px solid rgba(230, 200, 210, 0.5);
            box-shadow: var(--shadow-soft);
            margin-bottom: 16px;
        }

        .search-box i {
            color: var(--text-light);
            margin-right: 8px;
        }

        .search-box input {
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-primary);
            width: 100%;
            outline: none;
        }

        .tag-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .tag-area .tag-label {
            font-size: 0.82rem;
            color: var(--text-light);
            white-space: nowrap;
        }

        .tag-btn {
            background: var(--white-card);
            border: 1px solid rgba(230, 200, 210, 0.5);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .tag-btn:hover {
            background: rgba(250, 218, 221, 0.35);
            color: var(--sakura-deep);
        }

        .tag-btn.selected {
            background: var(--sakura-pink);
            color: var(--sakura-deep);
            border-color: var(--sakura-mid);
            font-weight: 600;
            box-shadow: 0 0 0 3px rgba(244, 184, 193, 0.25);
        }

        .tag-btn .tag-check {
            font-size: 0.7rem;
            opacity: 0;
            transition: var(--transition);
        }

        .tag-btn.selected .tag-check {
            opacity: 1;
        }

        .tag-clear-btn {
            background: transparent;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 6px 10px;
            border-radius: 50px;
            transition: var(--transition);
            white-space: nowrap;
        }

        .tag-clear-btn:hover {
            color: var(--sakura-deep);
            background: rgba(250, 218, 221, 0.3);
        }

        .tag-clear-btn.hidden {
            display: none;
        }

        .tag-count-badge {
            background: var(--sakura-deep);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 50px;
            font-weight: 700;
        }

        /* 工具网格 */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tool-card {
            background: var(--white-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            background: var(--white-card-hover);
        }

        .tool-card .tool-icon {
            font-size: 2rem;
        }

        .tool-card .tool-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tool-card .tool-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
        }

        .tool-card .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: auto;
        }

        .tool-card .tool-tag {
            background: var(--lavender);
            color: #6B5B7B;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.72rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .tool-card .tool-tag.matched {
            background: var(--sakura-pink);
            color: var(--sakura-deep);
            font-weight: 700;
        }

        /* 空状态 */
        .no-result {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-size: 1rem;
            grid-column: 1/-1;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0 40px;
            flex-wrap: wrap;
        }

        .page-btn {
            background: var(--white-card);
            border: 1px solid rgba(230, 200, 210, 0.5);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
            min-width: 40px;
            text-align: center;
        }

        .page-btn:hover {
            background: rgba(250, 218, 221, 0.4);
            color: var(--sakura-deep);
        }

        .page-btn.active {
            background: var(--sakura-pink);
            color: var(--sakura-deep);
            border-color: var(--sakura-mid);
            font-weight: 700;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 0.82rem;
            color: var(--text-light);
            padding: 0 8px;
        }

        @media(max-width:768px) {
            .tool-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    <div class="sakura-container" id="sakuraContainer"></div>

    <nav class="navbar" data-aos="fade-down">
        <div class="navbar-inner">
            <a href="/" class="nav-brand"><span class="brand-icon">❄️</span>冰凌呀 · 小栈</a>
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/"><i class="fas fa-home"></i>首页</a></li>
                <li><a href="/blog/"><i class="fas fa-feather-alt"></i>博客</a></li>
                <li><a href="#" class="active"><i class="fas fa-wand-magic-sparkles"></i>工具</a></li>
                <li><a href="https://github.com/Ice-rink" target="_blank"><i class="fab fa-github"></i>GitHub</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header" data-aos="fade-up">
            <h1>🛠️ 实用小工具</h1>
            <p>轻量级在线工具，让日常开发更顺手</p>
        </div>

        <div class="filter-section" data-aos="fade-up">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索工具名称或描述...">
            </div>
            <div class="tag-area" id="tagArea">
                <span class="tag-label"><i class="fas fa-tags"></i> 筛选：</span>
            </div>
        </div>

        <div class="tool-grid" id="toolGrid"></div>

        <div class="pagination" id="pagination"></div>
    </main>

    <footer class="footer" data-aos="fade-up" data-aos-duration="700">
        <p style="margin-top:4px;font-size:0.78rem;">© 2026 Ice_rink · 保持好奇，保持温柔</p>
        <p>Made with <span class="footer-heart">💗</span> by <a href="https://github.com/Ice-rink" target="_blank"
                rel="noopener">Ice_rink</a> · 冰凌呀 & <a href="https://deepseek.com/" target="_blank"
                rel="noopener">DeepSeek</a> v4 Pro</p>
    </footer>
    
    <button class="back-to-top" id="backToTop" title="回到顶部"><i class="fas fa-arrow-up"></i></button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

    <script src="/lib/all.js"></script>
    <script>
        (function () {
            AOS.init({ duration: 700, once: true });

            let allTools = [];
            async function loadTools() {
                try {
                    const response = await fetch('/tools/toolData.json');
                    if (!response.ok) throw new Error('加载失败');
                    allTools = await response.json();

                    // 原有的初始化逻辑移到这里
                    buildTagButtons();
                    renderAll();
                } catch (error) {
                    document.getElementById('toolGrid').innerHTML = '<div class="no-result">📦 工具数据加载失败</div>';
                }
            }
            loadTools();


            let selectedTags = new Set();
            let searchTerm = '';
            const ITEMS_PER_PAGE = 6;
            let currentPage = 1;

            // ========== 提取所有标签 ==========
            function getAllTags() {
                const counts = {};
                allTools.forEach(t => {
                    t.tags.forEach(tag => {
                        counts[tag] = (counts[tag] || 0) + 1;
                    });
                });
                return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(x => x[0]);
            }

            // ========== 构建标签按钮 ==========
            function buildTagButtons() {
                const allTags = getAllTags();
                const area = document.getElementById('tagArea');
                let html = '<span class="tag-label"></span>';
                allTags.forEach(tag => {
                    const sel = selectedTags.has(tag);
                    html += `<button class="tag-btn${sel ? ' selected' : ''}" data-tag="${tag}">
                        ${tag}
                    </button>`;
                });
                const hasSel = selectedTags.size > 0;
                html += `<button class="tag-clear-btn${hasSel ? '' : ' hidden'}" id="tagClearBtn">
                    <i class="fas fa-times-circle"></i> 清除筛选
                </button>`;
                if (hasSel) html += `<span class="tag-count-badge">${selectedTags.size}</span>`;
                area.innerHTML = html;

                area.querySelectorAll('.tag-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tag = btn.dataset.tag;
                        selectedTags.has(tag) ? selectedTags.delete(tag) : selectedTags.add(tag);
                        currentPage = 1;
                        buildTagButtons();
                        renderAll();
                    });
                });
                const clearBtn = document.getElementById('tagClearBtn');
                if (clearBtn) clearBtn.addEventListener('click', () => {
                    selectedTags.clear();
                    currentPage = 1;
                    buildTagButtons();
                    renderAll();
                });
            }

            // ========== 筛选 ==========
            function filterTools() {
                return allTools.filter(t => {
                    if (selectedTags.size > 0 && !t.tags.some(tag => selectedTags.has(tag))) return false;
                    if (searchTerm) {
                        const q = searchTerm.toLowerCase();
                        if (!t.name.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q)) return false;
                    }
                    return true;
                });
            }

            // ========== 渲染工具卡片 ==========
            function renderToolCards() {
                const filtered = filterTools();
                const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

                const grid = document.getElementById('toolGrid');
                if (pageItems.length === 0) {
                    grid.innerHTML = '<div class="no-result">✨ 没有找到匹配的工具，试试调整筛选条件吧~</div>';
                } else {
                    grid.innerHTML = pageItems.map((t, i) => `
                        <a href="/tools/tool/${t.id}.html" class="tool-card" data-aos="fade-up" data-aos-delay="${i * 60}">
                            <span class="tool-icon">${t.icon}</span>
                            <span class="tool-name">${t.name}</span>
                            <span class="tool-desc">${t.desc}</span>
                            <div class="tool-tags">
                                ${t.tags.map(tag => {
                        const m = selectedTags.size > 0 && selectedTags.has(tag);
                        return `<span class="tool-tag${m ? ' matched' : ''}">${tag}</span>`;
                    }).join('')}
                            </div>
                        </a>
                    `).join('');
                }
                AOS.refresh();
                return totalPages;
            }

            // ========== 渲染分页 ==========
            function renderPagination(totalPages) {
                const pag = document.getElementById('pagination');
                if (totalPages <= 1) {
                    pag.innerHTML = '';
                    return;
                }
                let html = '';
                html += `<button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>`;

                const maxShow = 5;
                let startP = Math.max(1, currentPage - Math.floor(maxShow / 2));
                let endP = Math.min(totalPages, startP + maxShow - 1);
                if (endP - startP < maxShow - 1) startP = Math.max(1, endP - maxShow + 1);

                if (startP > 1) {
                    html += `<button class="page-btn" data-page="1">1</button>`;
                    if (startP > 2) html += `<span class="page-info">...</span>`;
                }
                for (let p = startP; p <= endP; p++) {
                    html += `<button class="page-btn${p === currentPage ? ' active' : ''}" data-page="${p}">${p}</button>`;
                }
                if (endP < totalPages) {
                    if (endP < totalPages - 1) html += `<span class="page-info">...</span>`;
                    html += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
                }
                html += `<button class="page-btn" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>`;
                html += `<span class="page-info">第 ${currentPage} / ${totalPages} 页</span>`;
                pag.innerHTML = html;

                pag.querySelectorAll('.page-btn:not([disabled])').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const p = parseInt(btn.dataset.page);
                        if (p >= 1 && p <= totalPages) {
                            currentPage = p;
                            renderAll();
                            window.scrollTo({ top: document.getElementById('toolGrid').offsetTop - 120, behavior: 'smooth' });
                        }
                    });
                });
            }

            function renderAll() {
                const totalPages = renderToolCards();
                renderPagination(totalPages);
            }

            // ========== 搜索 ==========
            document.getElementById('searchInput').addEventListener('input', e => {
                searchTerm = e.target.value;
                currentPage = 1;
                renderAll();
            });

            // ========== 启动 ==========
            buildTagButtons();
            renderAll();

        })();
    </script>
</body>

</html>
