<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">冰凌の小栈 | 文章</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <!-- marked.js 用于 Markdown 渲染 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js">
    </script>

    <!-- highlight.js 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js">
    </script>

    <link rel="stylesheet" href="/lib/all.css">
    <style>
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }

        .loading .spinner {
            display: inline-block;
            width: 44px;
            height: 44px;
            border: 3px solid var(--lavender);
            border-top-color: var(--sakura-deep);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 14px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .error-state .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* 面包屑 */
        .breadcrumb {
            padding: 28px 0 8px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .breadcrumb a:hover {
            color: var(--sakura-deep);
        }

        .breadcrumb span {
            margin: 0 6px;
        }

        /* 文章卡片 */
        .article-card {
            background: var(--white-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            box-shadow: var(--shadow-card);
            margin-bottom: 30px;
            transition: var(--transition);
        }

        .article-card:hover {
            box-shadow: var(--shadow-hover);
            background: var(--white-card-hover);
        }

        /* 文章头部 */
        .article-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px dashed rgba(230, 200, 210, 0.4);
        }

        .article-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .article-meta .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .article-meta .meta-views {
            margin-left: auto;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .article-tag {
            background: var(--lavender);
            color: #6B5B7B;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .article-tag:hover {
            background: var(--sakura-mid);
            color: #fff;
        }

        /* ========== 新评论系统样式 ========== */
        .comments-container {
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .comments-container h3 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comments-container h3 i {
            color: var(--sakura-deep);
        }

        /* 评论列表 */
        .comments-list {
            background: rgba(255, 245, 247, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 28px;
            min-height: 150px;
        }

        .comment-item {
            padding: 16px 0;
            border-bottom: 1px solid rgba(230, 200, 210, 0.4);
            transition: var(--transition);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--sakura-pink), var(--sakura-mid));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--sakura-deep);
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .comment-nickname {
            font-weight: 600;
            color: var(--sakura-deep);
            font-size: 0.9rem;
        }

        .comment-time {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-left: auto;
        }

        .comment-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-left: 42px;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .empty-comments {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-comments i {
            font-size: 2rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .comments-loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        /* 评论表单 */
        .comment-form-card {
            background: rgba(255, 245, 247, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: 16px;
            padding: 24px 28px;
        }

        .comment-form-card h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .comment-form-card h4 i {
            color: var(--sakura-deep);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: #e88d9b;
        }

        .form-group label .optional {
            font-weight: normal;
            color: var(--text-light);
            font-size: 0.7rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid rgba(230, 200, 210, 0.5);
            border-radius: 12px;
            font-family: 'Noto Sans SC', 'Quicksand', sans-serif;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.7);
            transition: var(--transition);
            color: var(--text-primary);
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--sakura-mid);
            box-shadow: 0 0 0 3px rgba(244, 184, 193, 0.2);
            background: rgba(255, 255, 255, 0.95);
        }

        .form-group textarea {
            resize: vertical;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .char-counter {
            font-size: 0.7rem;
            color: var(--text-light);
        }

        .char-counter.warning {
            color: #e8a060;
        }

        .char-counter.over {
            color: #e88d9b;
        }

        .submit-comment-btn {
            background: linear-gradient(135deg, #F4B8C1, #E88D9B);
            border: none;
            border-radius: 30px;
            padding: 8px 24px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .submit-comment-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(232, 141, 155, 0.3);
        }

        .submit-comment-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-message {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            display: none;
        }

        .form-message.success {
            display: block;
            background: rgba(200, 230, 210, 0.5);
            color: #3a6a4a;
            border: 1px solid rgba(150, 210, 170, 0.5);
        }

        .form-message.error {
            display: block;
            background: rgba(255, 210, 210, 0.5);
            color: #a04040;
            border: 1px solid rgba(240, 170, 170, 0.5);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .comments-list {
                padding: 16px;
            }

            .comment-content {
                margin-left: 0;
            }

            .comment-header {
                flex-wrap: wrap;
            }

            .comment-time {
                margin-left: 0;
                width: 100%;
                margin-top: 4px;
            }

            .comment-form-card {
                padding: 18px;
            }
        }

        /* Markdown 正文渲染 */
        .article-body {
            font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
            line-height: 1.9;
            color: var(--text-primary);
        }

        .article-body h1,
        .article-body h2,
        .article-body h3,
        .article-body h4 {
            font-family: 'Noto Sans SC', sans-serif;
            margin-top: 1.5em;
            margin-bottom: 0.6em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .article-body h1 {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--sakura-pink);
            padding-bottom: 8px;
        }

        .article-body h2 {
            font-size: 1.3rem;
            border-left: 4px solid var(--sakura-mid);
            padding-left: 12px;
        }

        .article-body h3 {
            font-size: 1.1rem;
        }

        .article-body p {
            margin-bottom: 1em;
        }

        .article-body a {
            color: var(--sakura-deep);
            text-decoration: none;
            border-bottom: 1px dashed var(--sakura-mid);
            transition: var(--transition);
        }

        .article-body a:hover {
            border-bottom-style: solid;
        }

        .article-body blockquote {
            border-left: 4px solid var(--sakura-pink);
            background: rgba(250, 218, 221, 0.2);
            margin: 1em 0;
            padding: 12px 18px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
        }

        .article-body blockquote p {
            margin-bottom: 0;
        }

        .article-body ul,
        .article-body ol {
            margin: 0.8em 0;
            padding-left: 1.5em;
        }

        .article-body li {
            margin-bottom: 4px;
        }

        .article-body code {
            background: rgba(232, 213, 245, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
        }

        .article-body pre {
            background: #FAFAFA;
            border: 1px solid rgba(230, 200, 210, 0.4);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            overflow-x: auto;
            margin: 1em 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .article-body pre code {
            background: none;
            padding: 0;
            font-size: inherit;
        }

        .article-body img {
            max-width: 100%;
            border-radius: var(--radius-md);
            margin: 1em 0;
            box-shadow: var(--shadow-soft);
        }

        .article-body hr {
            border: none;
            border-top: 2px dashed rgba(200, 180, 210, 0.4);
            margin: 2em 0;
        }

        .article-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }

        .article-body th,
        .article-body td {
            border: 1px solid rgba(230, 200, 210, 0.4);
            padding: 10px 14px;
            text-align: left;
        }

        .article-body th {
            background: rgba(250, 218, 221, 0.3);
            font-weight: 600;
        }

        /* 底部导航 */
        .article-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 2px dashed rgba(230, 200, 210, 0.4);
            flex-wrap: wrap;
            gap: 12px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .article-card {
                padding: 24px 18px;
            }

            .article-header h1 {
                font-size: 1.4rem;
            }

            .article-meta {
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body>

            <h3><i class="fas fa-comments"></i> <span id="commentCount">0</span> 条评论</h3>
        
            <!-- 评论列表区域 -->
            <div id="commentsList" class="comments-list">
                <div class="comments-loading">💬 加载评论中...</div>

            <!-- 发表评论表单 -->
            <div class="comment-form-card">
                <h4><i class="fas fa-pen"></i> 留下你的想法</h4>
                <form id="commentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> 昵称 <span class="required">*</span></label>
                            <input type="text" id="commentNickname" placeholder="怎么称呼你？" maxlength="20" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> 邮箱 <span class="optional">(可选)</span></label>
                            <input type="email" id="commentEmail" placeholder="不会公开，用于头像显示">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js">
    </script>

    <script src="/lib/all.js"></script>
    <script>
        (function () {
            AOS.init({ duration: 700, once: true });

            // ========== 配置 marked.js ==========
            marked.setOptions({
                gfm: true,
                breaks: true,
                highlight: function (code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) { }
                    }
                    return code;
                }
            });

            // ========== 加载文章 ==========
            async function loadPost() {
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('id');

                if (!postId) {
                    showError('❓ 未指定文章 ID', '请从博客列表页点击文章标题访问，或者在 URL 后添加 ?id=001');
                    return;
                }

                const loadingEl = document.getElementById('loading');
                const contentEl = document.getElementById('articleContent');

                try {
                    const response = await fetch(`posts/${postId}.md`);
                    if (!response.ok) {
                        throw new Error(`文章不存在（${response.status}）`);
                    }

                    const mdText = await response.text();
                    const parsed = parseFrontMatter(mdText);

                    // 更新页面标题
                    document.title = `冰凌の小栈 | ${parsed.meta.title || '文章'}`;
                    document.getElementById('breadcrumbTitle').textContent = parsed.meta.title || '文章';

                    // 渲染 HTML
                    const tags = Array.isArray(parsed.meta.tags) ?
                        parsed.meta.tags :
                        (typeof parsed.meta.tags === 'string' ? [parsed.meta.tags] : []);

                    const pageUrl = `posts/${postId}.md`;
                    const htmlContent = marked.parse(parsed.content);

                    contentEl.innerHTML = `
                        <div class="article-card" data-aos="fade-up" data-aos-duration="600">
                            <div class="article-header">
                                <h1>${parsed.meta.title || '无标题'}</h1>
                                <div class="article-meta">
                                    <span class="meta-item">
                                        <i class="far fa-calendar-alt"></i>
                                        ${parsed.meta.date || '未标注日期'}
                                    </span>
                                    <span class="meta-item meta-views">
                                        <i class="far fa-eye"></i>
                                        <span id="visitor-count">-</span> 次阅读
                                    </span>
                                </div>
                                ${tags.length > 0 ? `
                                <div class="article-tags">
                                    ${tags.map(t => `<a href="index.html?tag=${encodeURIComponent(t)}" class="article-tag">${t}</a>`).join('')}
                                </div>
                                ` : ''}
                            </div>
                            <div class="article-body">
                                ${htmlContent}
                            </div>
                            <div class="article-footer">
                                <a href="index.html" class="btn btn-outline">
                                    <i class="fas fa-arrow-left"></i> 返回博客列表
                                </a>
                                <a href="#" class="btn btn-primary" id="scrollToTop">
                                    <i class="fas fa-arrow-up"></i> 回到顶部
                                </a>
                            </div>
                        </div>
                    `;

                    // 隐藏加载动画
                    loadingEl.style.display = 'none';
                    contentEl.style.display = 'block';

                    // 代码高亮
                    contentEl.querySelectorAll('pre code').forEach(block => {
                        hljs.highlightElement(block);
                    });

                    // 回到顶部按钮绑定
                    document.getElementById('scrollToTop').addEventListener('click', (e) => {
                        e.preventDefault();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });

                    // 在 loadPost 函数中，渲染完成后调用
                    async function updateVisitorCount(postId) {
                        const key = `blog_${postId}`;
                        const countEl = document.getElementById('visitor-count');

                        try {
                            // 添加访问量（自动 +1）
                            const addRes = await fetch(`/api/visit?mode=add&key=${key}`);
                            const addData = await addRes.json();

                            if (countEl) {
                                countEl.innerText = addData.visits;
                            }
                        } catch (error) {
                            console.error('浏览量统计失败:', error);
                            if (countEl) {
                                countEl.innerText = '-';
                            }
                        }
                    }
                    updateVisitorCount(postId);

                    // 刷新 AOS
                    AOS.refresh();

                } catch (error) {
                    showError('📄 文章加载失败', error.message);
                }
            }

            // ========== 新评论系统 ==========
            let currentPostId = null;

            // 获取当前文章 ID（复用已有的 postId）
            function getCurrentPostId() {
                const params = new URLSearchParams(window.location.search);
                return params.get('id');
            }

            // 加载评论列表
            async function loadComments(postId) {
                const commentsList = document.getElementById('commentsList');
                if (!commentsList) return;

                commentsList.innerHTML = '<div class="comments-loading">💬 加载评论中...</div>';

                try {
                    const response = await fetch(`/api/comments?postId=${postId}`);
                    const data = await response.json();

                    if (!data.success) {
                        throw new Error(data.error || '加载失败');
                    }

                    const comments = data.comments || [];
                    const countEl = document.getElementById('commentCount');
                    if (countEl) countEl.textContent = comments.length;

                    if (comments.length === 0) {
                        commentsList.innerHTML = `
                <div class="empty-comments">
                    <i class="fas fa-comment-dots"></i>
                    <p>还没有评论，来说两句吧～</p>
                </div>
            `;
                        return;
                    }

                    commentsList.innerHTML = comments.map(comment => {
                        // 获取昵称首字母作为头像文字
                        const initial = comment.nickname ? comment.nickname.charAt(0).toUpperCase() : '?';
                        // 格式化时间
                        const date = new Date(comment.createdAt);
                        const timeStr = date.toLocaleString('zh-CN', {
                            year: 'numeric',
                            month: '2-digit',
                            day: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                        // 对内容进行换行处理
                        const contentHtml = escapeHtml(comment.content).replace(/\n/g, '<br>');
                        return `
                <div class="comment-item">
                    <div class="comment-header">
                        <div class="comment-avatar">${escapeHtml(initial)}</div>
                        <span class="comment-nickname">${escapeHtml(comment.nickname)}</span>
                        <span class="comment-time">${timeStr}</span>
                    </div>
                    <div class="comment-content">${contentHtml}</div>
                </div>
            `;
                    }).join('');
                } catch (error) {
                    console.error('加载评论失败:', error);
                    commentsList.innerHTML = '<div class="empty-comments"><i class="fas fa-exclamation-circle"></i><p>评论加载失败，请刷新重试</p></div>';
                }
            }

            // 简单的转义函数
            function escapeHtml(str) {
                if (!str) return '';
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            // 提交评论
            async function submitComment(postId, nickname, email, content) {
                const response = await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ postId, nickname, email, content }),
                });
                return await response.json();
            }

            // 初始化评论系统
            function initComments() {
                currentPostId = getCurrentPostId();
                if (!currentPostId) return;

                // 加载评论列表
                loadComments(currentPostId);

                // 表单提交
                const form = document.getElementById('commentForm');
                const nicknameInput = document.getElementById('commentNickname');
                const emailInput = document.getElementById('commentEmail');
                const contentInput = document.getElementById('commentContent');
                const submitBtn = document.getElementById('submitCommentBtn');
                const formMessage = document.getElementById('commentFormMessage');
                const charCountSpan = document.getElementById('charCount');

                // 字符计数
                if (contentInput && charCountSpan) {
                    contentInput.addEventListener('input', () => {
                        const len = contentInput.value.length;
                        charCountSpan.textContent = len;
                        const counter = document.querySelector('.char-counter');
                        if (counter) {
                            if (len >= 450) {
                                counter.classList.add('warning');
                            } else {
                                counter.classList.remove('warning');
                            }
                            if (len >= 500) {
                                counter.classList.add('over');
                            } else {
                                counter.classList.remove('over');
                            }
                        }
                    });
                }

                if (!form) return;

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const nickname = nicknameInput?.value.trim();
                    const email = emailInput?.value.trim() || '';
                    const content = contentInput?.value.trim();

                    if (!nickname) {
                        showFormMessage('请填写昵称', 'error');
                        nicknameInput?.focus();
                        return;
                    }
                    if (nickname.length > 20) {
                        showFormMessage('昵称不能超过20个字符', 'error');
                        nicknameInput?.focus();
                        return;
                    }
                    if (!content) {
                        showFormMessage('请填写评论内容', 'error');
                        contentInput?.focus();
                        return;
                    }
                    if (content.length > 500) {
                        showFormMessage('评论内容不能超过500个字符', 'error');
                        contentInput?.focus();
                        return;
                    }

                    // 禁用按钮，显示加载状态
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';
                    formMessage.style.display = 'none';

                    try {
                        const result = await submitComment(currentPostId, nickname, email, content);

                        if (result.success) {
                            showFormMessage('评论发表成功！', 'success');
                            // 清空表单
                            if (contentInput) contentInput.value = '';
                            if (charCountSpan) charCountSpan.textContent = '0';
                            // 重新加载评论列表
                            await loadComments(currentPostId);
                            // 滚动到评论列表顶部
                            const commentsList = document.getElementById('commentsList');
                            if (commentsList) {
                                commentsList.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        } else {
                            showFormMessage(result.error || '发表失败，请稍后重试', 'error');
                        }
                    } catch (error) {
                        console.error('提交评论失败:', error);
                        showFormMessage('网络错误，请稍后重试', 'error');
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发表评论';
                    }
                });

                function showFormMessage(msg, type) {
                    if (!formMessage) return;
                    formMessage.textContent = msg;
                    formMessage.className = `form-message ${type}`;
                    setTimeout(() => {
                        formMessage.style.display = 'none';
                    }, 3000);
                }
            }

            // 等待 DOM 加载完成后初始化评论系统
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initComments);
            } else {
                initComments();
            }

            function showError(title, message) {
                document.getElementById('loading').style.display = 'none';
                const contentEl = document.getElementById('articleContent');
                contentEl.style.display = 'block';
                contentEl.innerHTML = `
                    <div class="article-card error-state" data-aos="fade-up">
                        <div class="error-icon">💔</div>
                        <h2>${title}</h2>
                        <p style="margin-top:8px;">${message}</p>
                        <div style="margin-top:24px;">
                            <a href="index.html" class="btn btn-primary">
                                <i class="fas fa-arrow-left"></i> 返回博客列表
                            </a>
                        </div>
                    </div>
                `;
                AOS.refresh();
            }

            // 启动
            loadPost();

        })();
    </script>
</body>
