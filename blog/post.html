<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

    <link rel="stylesheet" href="/lib/all.css">
    <style>
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }

        .loading .spinner {
            display: inline-block;
            width: 44px;
            height: 44px;
            border: 3px solid var(--lavender);
            border-top-color: var(--sakura-deep);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 14px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .error-state .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* 面包屑 */
        .breadcrumb {
            padding: 28px 0 8px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .breadcrumb a:hover {
            color: var(--sakura-deep);
        }

        .breadcrumb span {
            margin: 0 6px;
        }

        /* 文章卡片 */
        .article-card {
            background: var(--white-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            box-shadow: var(--shadow-card);
            margin-bottom: 30px;
            transition: var(--transition);
        }

        .article-card:hover {
            box-shadow: var(--shadow-hover);
            background: var(--white-card-hover);
        }

        /* 文章头部 */
        .article-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px dashed rgba(230, 200, 210, 0.4);
        }

        .article-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .article-meta .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .article-meta .meta-views {
            margin-left: auto;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .article-tag {
            background: var(--lavender);
            color: #6B5B7B;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .article-tag:hover {
            background: var(--sakura-mid);
            color: #fff;
        }

        /* Markdown 正文渲染 */
        .article-body {
            font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
            line-height: 1.9;
            color: var(--text-primary);
        }

        .article-body h1,
        .article-body h2,
        .article-body h3,
        .article-body h4 {
            font-family: 'Noto Sans SC', sans-serif;
            margin-top: 1.5em;
            margin-bottom: 0.6em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .article-body h1 {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--sakura-pink);
            padding-bottom: 8px;
        }

        .article-body h2 {
            font-size: 1.3rem;
            border-left: 4px solid var(--sakura-mid);
            padding-left: 12px;
        }

        .article-body h3 {
            font-size: 1.1rem;
        }

        .article-body p {
            margin-bottom: 1em;
        }

        .article-body a {
            color: var(--sakura-deep);
            text-decoration: none;
            border-bottom: 1px dashed var(--sakura-mid);
            transition: var(--transition);
        }

        .article-body a:hover {
            border-bottom-style: solid;
        }

        .article-body blockquote {
            border-left: 4px solid var(--sakura-pink);
            background: rgba(250, 218, 221, 0.2);
            margin: 1em 0;
            padding: 12px 18px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
        }

        .article-body blockquote p {
            margin-bottom: 0;
        }

        .article-body ul,
        .article-body ol {
            margin: 0.8em 0;
            padding-left: 1.5em;
        }

        .article-body li {
            margin-bottom: 4px;
        }

        .article-body code {
            background: rgba(232, 213, 245, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
        }

        .article-body pre {
            background: #FAFAFA;
            border: 1px solid rgba(230, 200, 210, 0.4);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            overflow-x: auto;
            margin: 1em 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .article-body pre code {
            background: none;
            padding: 0;
            font-size: inherit;
        }

        .article-body img {
            max-width: 100%;
            border-radius: var(--radius-md);
            margin: 1em 0;
            box-shadow: var(--shadow-soft);
        }

        .article-body hr {
            border: none;
            border-top: 2px dashed rgba(200, 180, 210, 0.4);
            margin: 2em 0;
        }

        .article-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }

        .article-body th,
        .article-body td {
            border: 1px solid rgba(230, 200, 210, 0.4);
            padding: 10px 14px;
            text-align: left;
        }

        .article-body th {
            background: rgba(250, 218, 221, 0.3);
            font-weight: 600;
        }

        /* 底部导航 */
        .article-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 2px dashed rgba(230, 200, 210, 0.4);
            flex-wrap: wrap;
            gap: 12px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .article-card {
                padding: 24px 18px;
            }

            .article-header h1 {
                font-size: 1.4rem;
            }

            .article-meta {
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    <div class="sakura-container" id="sakuraContainer"></div>

    <!-- 导航栏 -->
    <nav class="navbar" data-aos="fade-down" data-aos-duration="600">
        <div class="navbar-inner">
            <a href="/index.html" class="nav-brand">
                <span class="brand-icon">❄️</span>
                <span>冰凌呀 · 小栈</span>
            </a>
            <button class="hamburger" id="hamburgerBtn" aria-label="菜单">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/"><i class="fas fa-home"></i>首页</a></li>
                <li><a href="/blog/" class="active"><i class="fas fa-feather-alt"></i>博客</a></li>
                <li><a href="/tools/"><i class="fas fa-wand-magic-sparkles"></i>工具</a></li>
                <li><a href="https://github.com/Ice-rink" target="_blank" rel="noopener"><i
                            class="fab fa-github"></i>GitHub</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- 面包屑 -->
        <div class="breadcrumb" data-aos="fade-up" data-aos-duration="500">
            <a href="/">首页</a><span>›</span>
            <a href="/blog/">博客</a><span>›</span>
            <span id="breadcrumbTitle">文章</span>
        </div>

        <!-- 加载中 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在加载文章...</p>
        </div>

        <!-- 文章内容 -->
        <div id="articleContent" style="display:none;"></div>
    </main>

    <!-- 评论区 - Twikoo -->
    <div class="twikoo-container" data-aos="fade-up">
        <h3><i class="fas fa-comments"></i> 评论区</h3>
        <div id="twikoo-comments"></div>
    </div>
    
    <!-- Twikoo 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/twikoo@1.7.3/dist/twikoo.all.min.js"></script>
    <script>
        (function () {
            // 等待页面主要内容加载完成
            function initTwikoo() {
                if (typeof twikoo === 'undefined') {
                    console.warn('Twikoo 未加载，稍后重试');
                    setTimeout(initTwikoo, 500);
                    return;
                }
                twikoo.init({
                    // ⚠️ 请替换为你自己的后端地址
                    envId: 'https://twikoo.ice-rink.online/',
                    el: '#twikoo-comments',
                    lang: 'zh-CN',
                }).then(() => {
                    console.log('✅ 评论系统已就绪');
                }).catch(err => {
                    console.error('❌ 评论系统加载失败:', err);
                    // 可选：显示友好提示
                    const el = document.getElementById('twikoo-comments');
                    if (el) el.innerHTML = '<p style="text-align:center;color:var(--text-light);">💬 评论功能暂时不可用，请稍后再试～</p>';
                });
            }
            // 确保 DOM 完全加载后再执行
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTwikoo);
            } else {
                initTwikoo();
            }
        })();
    </script>

    <footer class="footer" data-aos="fade-up" data-aos-duration="700">
        <p style="margin-top:4px;font-size:0.78rem;">© 2026 Ice_rink · 保持好奇，保持温柔</p>
        <p>Made with <span class="footer-heart">💗</span> by <a href="https://github.com/Ice-rink" target="_blank"
                rel="noopener">Ice_rink</a> · 冰凌呀 & <a href="https://chat.deepseek.com/" target="_blank"
                rel="noopener">DeepSeek</a> v4 Pro</p>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="回到顶部" title="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js">
    </script>

    <script src="/lib/all.js"></script>
    <script>
        (function () {
            AOS.init({ duration: 700, once: true });

            // ========== 配置 marked.js ==========
            marked.setOptions({
                gfm: true,
                breaks: true,
                highlight: function (code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) { }
                    }
                    return code;
                }
            });

            // ========== 加载文章 ==========
            async function loadPost() {
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('id');

                if (!postId) {
                    showError('❓ 未指定文章 ID', '请从博客列表页点击文章标题访问，或者在 URL 后添加 ?id=001');
                    return;
                }

                const loadingEl = document.getElementById('loading');
                const contentEl = document.getElementById('articleContent');

                try {
                    const response = await fetch(`posts/${postId}.md`);
                    if (!response.ok) {
                        throw new Error(`文章不存在（${response.status}）`);
                    }

                    const mdText = await response.text();
                    const parsed = parseFrontMatter(mdText);

                    // 更新页面标题
                    document.title = `冰凌の小栈 | ${parsed.meta.title || '文章'}`;
                    document.getElementById('breadcrumbTitle').textContent = parsed.meta.title || '文章';

                    // 渲染 HTML
                    const tags = Array.isArray(parsed.meta.tags) ?
                        parsed.meta.tags :
                        (typeof parsed.meta.tags === 'string' ? [parsed.meta.tags] : []);

                    const pageUrl = `posts/${postId}.md`;
                    const htmlContent = marked.parse(parsed.content);

                    contentEl.innerHTML = `
                        <div class="article-card" data-aos="fade-up" data-aos-duration="600">
                            <div class="article-header">
                                <h1>${parsed.meta.title || '无标题'}</h1>
                                <div class="article-meta">
                                    <span class="meta-item">
                                        <i class="far fa-calendar-alt"></i>
                                        ${parsed.meta.date || '未标注日期'}
                                    </span>
                                    <span class="meta-item meta-views">
                                        <i class="far fa-eye"></i>
                                        <span id="visitor-count">-</span> 次阅读
                                    </span>
                                </div>
                                ${tags.length > 0 ? `
                                <div class="article-tags">
                                    ${tags.map(t => `<a href="index.html?tag=${encodeURIComponent(t)}" class="article-tag">${t}</a>`).join('')}
                                </div>
                                ` : ''}
                            </div>
                            <div class="article-body">
                                ${htmlContent}
                            </div>
                            <div class="article-footer">
                                <a href="index.html" class="btn btn-outline">
                                    <i class="fas fa-arrow-left"></i> 返回博客列表
                                </a>
                                <a href="#" class="btn btn-primary" id="scrollToTop">
                                    <i class="fas fa-arrow-up"></i> 回到顶部
                                </a>
                            </div>
                        </div>
                    `;

                    // 隐藏加载动画
                    loadingEl.style.display = 'none';
                    contentEl.style.display = 'block';

                    // 代码高亮
                    contentEl.querySelectorAll('pre code').forEach(block => {
                        hljs.highlightElement(block);
                    });

                    // 回到顶部按钮绑定
                    document.getElementById('scrollToTop').addEventListener('click', (e) => {
                        e.preventDefault();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });

                    // 在 loadPost 函数中，渲染完成后调用
                    async function updateVisitorCount(postId) {
                        const key = `blog_${postId}`;
                        const countEl = document.getElementById('visitor-count');

                        try {
                            // 添加访问量（自动 +1）
                            const addRes = await fetch(`/api/visit?mode=add&key=${key}`);
                            const addData = await addRes.json();

                            if (countEl) {
                                countEl.innerText = addData.visits;
                            }
                        } catch (error) {
                            console.error('浏览量统计失败:', error);
                            if (countEl) {
                                countEl.innerText = '-';
                            }
                        }
                    }
                    updateVisitorCount(postId);

                    // 刷新 AOS
                    AOS.refresh();

                } catch (error) {
                    showError('📄 文章加载失败', error.message);
                }
            }

            function showError(title, message) {
                document.getElementById('loading').style.display = 'none';
                const contentEl = document.getElementById('articleContent');
                contentEl.style.display = 'block';
                contentEl.innerHTML = `
                    <div class="article-card error-state" data-aos="fade-up">
                        <div class="error-icon">💔</div>
                        <h2>${title}</h2>
                        <p style="margin-top:8px;">${message}</p>
                        <div style="margin-top:24px;">
                            <a href="index.html" class="btn btn-primary">
                                <i class="fas fa-arrow-left"></i> 返回博客列表
                            </a>
                        </div>
                    </div>
                `;
                AOS.refresh();
            }

            // 启动
            loadPost();

        })();
    </script>
</body>

</html>
