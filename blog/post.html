<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">文章 · 冰凌呀的小栈</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <!-- marked.js 用于 Markdown 渲染 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js">
    </script>

    <!-- highlight.js 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js">
    </script>

    <style>
        :root {
            --sakura-pink: #FADADD;
            --sakura-mid: #F4B8C1;
            --sakura-deep: #E88D9B;
            --lavender: #E8D5F5;
            --sky-blue: #D4EAF7;
            --mint-green: #D4F0E0;
            --text-primary: #4A3F4A;
            --text-secondary: #7A6F7A;
            --text-light: #A89DA8;
            --white-card: rgba(255, 255, 255, 0.75);
            --white-card-hover: rgba(255, 255, 255, 0.92);
            --shadow-soft: 0 4px 20px rgba(200, 160, 180, 0.18);
            --shadow-card: 0 8px 32px rgba(180, 140, 160, 0.14);
            --shadow-hover: 0 14px 40px rgba(180, 140, 160, 0.22);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: clamp(1rem, 2vw, 1.1rem);
        }

        body {
            font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
            background: linear-gradient(170deg, #FDE8EC 0%, #FDF2F8 15%, #F8F0F8 30%, #F0F0FA 50%, #F0F6FA 70%, #F5F0F8 85%, #FDE8EC 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(248, 200, 210, 0.25) 0%, transparent 70%);
            top: -100px;
            right: -80px;
            border-radius: 50%;
            animation: floatSlow 12s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(200, 180, 220, 0.2) 0%, transparent 70%);
            bottom: -60px;
            left: -90px;
            border-radius: 50%;
            animation: floatSlow 15s ease-in-out infinite reverse;
        }

        .bg-circle-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(180, 210, 230, 0.22) 0%, transparent 70%);
            top: 50%;
            left: 60%;
            border-radius: 50%;
            animation: floatSlow 10s ease-in-out infinite;
        }

        @keyframes floatSlow {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(18px, -20px) scale(1.04);
            }

            66% {
                transform: translate(-14px, 14px) scale(0.97);
            }
        }

        /* 樱花 */
        .sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .sakura-petal {
            position: absolute;
            top: -60px;
            opacity: 0.55;
            animation: sakuraFall linear infinite;
            font-size: 1.4rem;
        }

        @keyframes sakuraFall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0.6;
            }

            25% {
                transform: translateY(25vh) translateX(40px) rotate(90deg);
                opacity: 0.5;
            }

            50% {
                transform: translateY(50vh) translateX(-30px) rotate(180deg);
                opacity: 0.35;
            }

            75% {
                transform: translateY(75vh) translateX(25px) rotate(270deg);
                opacity: 0.2;
            }

            100% {
                transform: translateY(105vh) translateX(-15px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* 导航栏 */
        .navbar {
            position: sticky;
            top: 16px;
            z-index: 1000;
            margin: 16px auto 0;
            max-width: 820px;
            padding: 0 24px;
        }

        .navbar-inner {
            background: var(--white-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 220, 230, 0.5);
            border-radius: var(--radius-xl);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .nav-brand .brand-icon {
            font-size: 1.6rem;
            animation: bounceGentle 2s ease-in-out infinite;
        }

        @keyframes bounceGentle {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--sakura-deep);
            background: rgba(250, 218, 221, 0.4);
        }

        .nav-links a i {
            margin-right: 5px;
            font-size: 0.85rem;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-primary);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
        }

        .hamburger:hover {
            background: rgba(250, 218, 221, 0.3);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }

        .loading .spinner {
            display: inline-block;
            width: 44px;
            height: 44px;
            border: 3px solid var(--lavender);
            border-top-color: var(--sakura-deep);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 14px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .error-state .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* 面包屑 */
        .breadcrumb {
            padding: 28px 0 8px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }

        .breadcrumb a:hover {
            color: var(--sakura-deep);
        }

        .breadcrumb span {
            margin: 0 6px;
        }

        /* 文章卡片 */
        .article-card {
            background: var(--white-card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(240, 215, 225, 0.5);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            box-shadow: var(--shadow-card);
            margin-bottom: 30px;
            transition: var(--transition);
        }

        .article-card:hover {
            box-shadow: var(--shadow-hover);
            background: var(--white-card-hover);
        }

        /* 文章头部 */
        .article-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px dashed rgba(230, 200, 210, 0.4);
        }

        .article-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .article-meta .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .article-meta .meta-views {
            margin-left: auto;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .article-tag {
            background: var(--lavender);
            color: #6B5B7B;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .article-tag:hover {
            background: var(--sakura-mid);
            color: #fff;
        }

        /* Markdown 正文渲染 */
        .article-body {
            font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
            line-height: 1.9;
            color: var(--text-primary);
        }

        .article-body h1,
        .article-body h2,
        .article-body h3,
        .article-body h4 {
            font-family: 'Noto Sans SC', sans-serif;
            margin-top: 1.5em;
            margin-bottom: 0.6em;
            font-weight: 600;
            color: var(--text-primary);
        }

        .article-body h1 {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--sakura-pink);
            padding-bottom: 8px;
        }

        .article-body h2 {
            font-size: 1.3rem;
            border-left: 4px solid var(--sakura-mid);
            padding-left: 12px;
        }

        .article-body h3 {
            font-size: 1.1rem;
        }

        .article-body p {
            margin-bottom: 1em;
        }

        .article-body a {
            color: var(--sakura-deep);
            text-decoration: none;
            border-bottom: 1px dashed var(--sakura-mid);
            transition: var(--transition);
        }

        .article-body a:hover {
            border-bottom-style: solid;
        }

        .article-body blockquote {
            border-left: 4px solid var(--sakura-pink);
            background: rgba(250, 218, 221, 0.2);
            margin: 1em 0;
            padding: 12px 18px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
        }

        .article-body blockquote p {
            margin-bottom: 0;
        }

        .article-body ul,
        .article-body ol {
            margin: 0.8em 0;
            padding-left: 1.5em;
        }

        .article-body li {
            margin-bottom: 4px;
        }

        .article-body code {
            background: rgba(232, 213, 245, 0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
        }

        .article-body pre {
            background: #FAFAFA;
            border: 1px solid rgba(230, 200, 210, 0.4);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            overflow-x: auto;
            margin: 1em 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .article-body pre code {
            background: none;
            padding: 0;
            font-size: inherit;
        }

        .article-body img {
            max-width: 100%;
            border-radius: var(--radius-md);
            margin: 1em 0;
            box-shadow: var(--shadow-soft);
        }

        .article-body hr {
            border: none;
            border-top: 2px dashed rgba(200, 180, 210, 0.4);
            margin: 2em 0;
        }

        .article-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }

        .article-body th,
        .article-body td {
            border: 1px solid rgba(230, 200, 210, 0.4);
            padding: 10px 14px;
            text-align: left;
        }

        .article-body th {
            background: rgba(250, 218, 221, 0.3);
            font-weight: 600;
        }

        /* 底部导航 */
        .article-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 2px dashed rgba(230, 200, 210, 0.4);
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            text-decoration: none;
        }

        .btn-outline {
            background: var(--white-card);
            color: var(--text-secondary);
            border: 1px solid rgba(220, 200, 210, 0.5);
            backdrop-filter: blur(8px);
        }

        .btn-outline:hover {
            background: var(--white-card-hover);
            color: var(--sakura-deep);
            border-color: var(--sakura-mid);
        }

        .btn-primary {
            background: linear-gradient(135deg, #F4B8C1, #E88D9B);
            color: #fff;
            box-shadow: 0 4px 14px rgba(232, 141, 155, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(232, 141, 155, 0.4);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            padding: 40px 0 30px;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--white-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(230, 200, 210, 0.4);
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-secondary);
            transition: var(--transition);
            opacity: 0;
            visibility: hidden;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            color: var(--sakura-deep);
            box-shadow: var(--shadow-card);
            transform: translateY(-3px);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 12px;
                top: 8px;
                margin-top: 8px;
            }

            .navbar-inner {
                padding: 12px 18px;
                border-radius: var(--radius-lg);
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 12px;
                right: 12px;
                flex-direction: column;
                background: var(--white-card-hover);
                backdrop-filter: blur(20px);
                border-radius: var(--radius-lg);
                padding: 16px;
                box-shadow: var(--shadow-card);
                gap: 4px;
            }

            .nav-links.open {
                display: flex;
            }

            .hamburger {
                display: block;
            }

            .article-card {
                padding: 24px 18px;
            }

            .article-header h1 {
                font-size: 1.4rem;
            }

            .article-meta {
                font-size: 0.78rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    <div class="sakura-container" id="sakuraContainer"></div>

    <!-- 导航栏 -->
    <nav class="navbar" data-aos="fade-down" data-aos-duration="600">
        <div class="navbar-inner">
            <a href="/index.html" class="nav-brand">
                <span class="brand-icon">❄️</span>
                <span>冰凌呀 · 小栈</span>
            </a>
            <button class="hamburger" id="hamburgerBtn" aria-label="菜单">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/"><i class="fas fa-home"></i>首页</a></li>
                <li><a href="/blog/" class="active"><i class="fas fa-feather-alt"></i>博客</a></li>
                <li><a href="/tools/"><i class="fas fa-wand-magic-sparkles"></i>工具</a></li>
                <li><a href="https://github.com/Ice-rink" target="_blank" rel="noopener"><i
                            class="fab fa-github"></i>GitHub</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <!-- 面包屑 -->
        <div class="breadcrumb" data-aos="fade-up" data-aos-duration="500">
            <a href="/">首页</a><span>›</span>
            <a href="/blog/">博客</a><span>›</span>
            <span id="breadcrumbTitle">文章</span>
        </div>

        <!-- 加载中 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在加载文章...</p>
        </div>

        <!-- 文章内容 -->
        <div id="articleContent" style="display:none;"></div>
    </main>

    <footer class="footer">
        <p>Made with 💗 by <a href="https://github.com/Ice-rink" target="_blank" rel="noopener">Ice_rink</a> · 冰凌呀</p>
    </footer>

    <button class="back-to-top" id="backToTop" aria-label="回到顶部" title="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- 不蒜子浏览量统计 -->
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js">
    </script>

    <script>
        (function () {
            AOS.init({ duration: 700, once: true });

            // ========== 配置 marked.js ==========
            marked.setOptions({
                gfm: true,
                breaks: true,
                highlight: function (code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (e) { }
                    }
                    return code;
                }
            });

            // ========== 樱花 ==========
            const sakura = document.getElementById('sakuraContainer');
            const petals = ['🌸', '💮', '🌷', '✿', '❀', '🩷', '🌺'];

            function createPetal() {
                const p = document.createElement('span');
                p.className = 'sakura-petal';
                p.textContent = petals[Math.floor(Math.random() * petals.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                p.style.animationDelay = Math.random() * 6 + 's';
                sakura.appendChild(p);
                p.addEventListener('animationend', () => {
                    p.remove();
                    createPetal();
                });
            }
            for (let i = 0; i < 18; i++) createPetal();

            // ========== 汉堡菜单 ==========
            const hamburger = document.getElementById('hamburgerBtn');
            const navLinks = document.getElementById('navLinks');
            hamburger.addEventListener('click', () => {
                navLinks.classList.toggle('open');
                hamburger.querySelector('i').className =
                    navLinks.classList.contains('open') ? 'fas fa-times' : 'fas fa-bars';
            });
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('open');
                    hamburger.querySelector('i').className = 'fas fa-bars';
                });
            });

            // ========== 回到顶部 ==========
            const backTop = document.getElementById('backToTop');
            window.addEventListener('scroll', () => {
                backTop.classList.toggle('visible', window.scrollY > 500);
            });
            backTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // ========== 解析 Front Matter ==========
            function parseFrontMatter(mdText) {
                const result = { meta: {}, content: '' };
                const fmRegex = /^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/;
                const match = mdText.match(fmRegex);
                if (match) {
                    const fmBlock = match[1];
                    result.content = match[2].trim();
                    fmBlock.split('\n').forEach(line => {
                        const colonIdx = line.indexOf(':');
                        if (colonIdx === -1) return;
                        const key = line.substring(0, colonIdx).trim();
                        let value = line.substring(colonIdx + 1).trim();
                        value = value.replace(/^["']|["']$/g, '');
                        if (value.startsWith('[') && value.endsWith(']')) {
                            try { value = JSON.parse(value); } catch (e) { }
                        }
                        result.meta[key] = value;
                    });
                } else {
                    result.content = mdText.trim();
                }
                return result;
            }

            // ========== 加载文章 ==========
            async function loadPost() {
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('id');

                if (!postId) {
                    showError('❓ 未指定文章 ID', '请从博客列表页点击文章标题访问，或者在 URL 后添加 ?id=001');
                    return;
                }

                const loadingEl = document.getElementById('loading');
                const contentEl = document.getElementById('articleContent');

                try {
                    const response = await fetch(`posts/${postId}.md`);
                    if (!response.ok) {
                        throw new Error(`文章不存在（${response.status}）`);
                    }

                    const mdText = await response.text();
                    const parsed = parseFrontMatter(mdText);

                    // 更新页面标题
                    document.title = `${parsed.meta.title || '文章'} · 冰凌呀的小栈`;
                    document.getElementById('breadcrumbTitle').textContent = parsed.meta.title || '文章';

                    // 渲染 HTML
                    const tags = Array.isArray(parsed.meta.tags) ?
                        parsed.meta.tags :
                        (typeof parsed.meta.tags === 'string' ? [parsed.meta.tags] : []);

                    const pageUrl = `posts/${postId}.md`;
                    const htmlContent = marked.parse(parsed.content);

                    contentEl.innerHTML = `
                        <div class="article-card" data-aos="fade-up" data-aos-duration="600">
                            <div class="article-header">
                                <h1>${parsed.meta.title || '无标题'}</h1>
                                <div class="article-meta">
                                    <span class="meta-item">
                                        <i class="far fa-calendar-alt"></i>
                                        ${parsed.meta.date || '未标注日期'}
                                    </span>
                                    <span class="meta-item meta-views">
                                        <i class="far fa-eye"></i>
                                        <span
                                            id="busuanzi_container_page_pv"
                                            data-busuanzi-page-url="${pageUrl}"
                                        >
                                            <span id="busuanzi_value_page_pv">-</span> 次阅读
                                        </span>
                                    </span>
                                </div>
                                ${tags.length > 0 ? `
                                <div class="article-tags">
                                    ${tags.map(t => `<a href="index.html?tag=${encodeURIComponent(t)}" class="article-tag">${t}</a>`).join('')}
                                </div>
                                ` : ''}
                            </div>
                            <div class="article-body">
                                ${htmlContent}
                            </div>
                            <div class="article-footer">
                                <a href="index.html" class="btn btn-outline">
                                    <i class="fas fa-arrow-left"></i> 返回博客列表
                                </a>
                                <a href="#" class="btn btn-primary" id="scrollToTop">
                                    <i class="fas fa-arrow-up"></i> 回到顶部
                                </a>
                            </div>
                        </div>
                    `;

                    // 隐藏加载动画
                    loadingEl.style.display = 'none';
                    contentEl.style.display = 'block';

                    // 代码高亮
                    contentEl.querySelectorAll('pre code').forEach(block => {
                        hljs.highlightElement(block);
                    });

                    // 回到顶部按钮绑定
                    document.getElementById('scrollToTop').addEventListener('click', (e) => {
                        e.preventDefault();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });

                    // 刷新 AOS
                    AOS.refresh();

                    // 不蒜子刷新
                    if (typeof busuanzi !== 'undefined' && busuanzi.fetch) {
                        busuanzi.fetch();
                    }

                } catch (error) {
                    showError('📄 文章加载失败', error.message);
                }
            }

            function showError(title, message) {
                document.getElementById('loading').style.display = 'none';
                const contentEl = document.getElementById('articleContent');
                contentEl.style.display = 'block';
                contentEl.innerHTML = `
                    <div class="article-card error-state" data-aos="fade-up">
                        <div class="error-icon">💔</div>
                        <h2>${title}</h2>
                        <p style="margin-top:8px;">${message}</p>
                        <div style="margin-top:24px;">
                            <a href="index.html" class="btn btn-primary">
                                <i class="fas fa-arrow-left"></i> 返回博客列表
                            </a>
                        </div>
                    </div>
                `;
                AOS.refresh();
            }

            // 启动
            loadPost();

        })();
    </script>
</body>

</html>
